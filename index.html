<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي | نظام التصحيح والتقارير</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #7f1d1d; --bg: #f8fafc; --dark: #1e293b; --success: #059669; --error: #dc2626; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #334155; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-right: 8px solid var(--primary); }
        .admin-header { background: var(--dark); color: white; padding: 30px; text-align: center; border-bottom: 6px solid var(--primary); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #cbd5e1; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Cairo'; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .q-box { background: #f1f5f9; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; }
        .correct-answer-box { border: 2px solid var(--success) !important; background: #f0fdf4; }
        .points-box { width: 80px !important; text-align: center; border: 2px solid #0284c7 !important; }
        .summary-card { padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 5px solid #ddd; }
        .summary-correct { border-color: var(--success); background: #f0fdf4; }
        .summary-wrong { border-color: var(--error); background: #fef2f2; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background: var(--dark); color: white; }
    </style>
</head>
<body>

<div id="adminView" class="hidden">
    <div class="admin-header"><h1>لوحة تحكم أ. عبدالعزيز الفيفي (النظام المطور) 🤖</h1></div>
    <div class="container">
        <div class="card">
            <h3>⚙️ الإعدادات العامة</h3>
            <input type="text" id="quizTitle" placeholder="عنوان الاختبار...">
            <div style="display:flex; gap:20px;">
                <label><input type="checkbox" id="shuffleOpt"> خلط الأسئلة</label>
                <label><input type="checkbox" id="lockOpt" checked> منع الإعادة</label>
            </div>
        </div>
        <div id="questionsArea"></div>
        <button class="btn" style="background:var(--dark); color:white; width:100%; margin-bottom:20px;" onclick="addQuestion()">+ إضافة سؤال (تحديد درجة + إجابة)</button>
        <div class="card">
            <button class="btn btn-main" onclick="saveToCloud()">💾 حفظ الاختبار في السحابة</button>
        </div>
        <div class="card"><h3>📊 سجل الدرجات والنتائج</h3><div id="modelsList">جاري التحميل...</div></div>
    </div>
</div>

<div id="studentView" class="hidden">
    <div class="container">
        <div class="card" id="studentLogin" style="text-align:center; margin-top:50px;">
            <h2 id="stQuizTitle">جاري التحميل...</h2>
            <input type="text" id="stName" placeholder="اسم الطالب الثلاثي">
            <input type="text" id="stClass" placeholder="الفصل">
            <button class="btn btn-main" onclick="startStudentQuiz()">بدء الاختبار</button>
        </div>
        <div id="stQuizArea" class="hidden">
            <div id="stQuestions"></div>
            <button class="btn btn-main" onclick="submitStudentAnswers()">إرسال الإجابات ومعاينة الملخص</button>
        </div>
        <div id="resultSummary" class="hidden card">
            <h2 style="text-align:center">🏁 ملخص الأداء النهائي</h2>
            <div id="totalScoreDisp" style="text-align:center; font-size:1.5rem; font-weight:900; color:var(--primary); margin-bottom:20px;"></div>
            <div id="summaryDetails"></div>
            <button class="btn btn-main" onclick="location.reload()">إغلاق ومعاودة البدء</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://youy-apps-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('id');
    let qCount = 0;

    if (quizId) { document.getElementById('studentView').classList.remove('hidden'); loadStudentQuiz(quizId); }
    else { document.getElementById('adminView').classList.remove('hidden'); fetchModels(); }

    function addQuestion(data = null) {
        qCount++;
        const html = `
            <div class="q-box" id="q_${qCount}">
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <select class="q-type" style="width:70%" onchange="renderInputs(this, ${qCount})">
                        <option value="text" ${data?.type=='text'?'selected':''}>سؤال وجواب (نحوي)</option>
                        <option value="choice" ${data?.type=='choice'?'selected':''}>اختيار من متعدد</option>
                    </select>
                    <input type="number" class="points-box" id="pts_${qCount}" placeholder="الدرجة" value="${data?.points||1}">
                </div>
                <div id="inputs_${qCount}"></div>
                <input type="text" class="correct-answer-box" id="correct_${qCount}" placeholder="الإجابة النموذجية الصحيحة" value="${data?.correct||''}">
                <button class="btn" style="background:#ef4444; color:white; font-size:0.7rem; margin-top:5px" onclick="this.parentElement.remove()">حذف</button>
            </div>`;
        document.getElementById('questionsArea').insertAdjacentHTML('beforeend', html);
        renderInputs(document.querySelector(`#q_${qCount} .q-type`), qCount, data);
    }

    function renderInputs(select, id, data = null) {
        const target = document.getElementById(`inputs_${id}`);
        let html = `<input type="text" class="q-text" placeholder="اكتب السؤال هنا" value="${data?.text||''}">`;
        if(select.value === 'choice') {
            html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><input type="text" class="opt1" placeholder="خيار 1" value="${data?.opts?.[0]||''}"> <input type="text" class="opt2" placeholder="خيار 2" value="${data?.opts?.[1]||''}"> <input type="text" class="opt3" placeholder="خيار 3" value="${data?.opts?.[2]||''}"> <input type="text" class="opt4" placeholder="خيار 4" value="${data?.opts?.[3]||''}"></div>`;
        }
        target.innerHTML = html;
    }

    function saveToCloud() {
        const title = document.getElementById('quizTitle').value;
        let questions = [];
        document.querySelectorAll('.q-box').forEach(box => {
            const id = box.id.split('_')[1];
            const type = box.querySelector('.q-type').value;
            let q = { type, text: box.querySelector('.q-text').value, correct: box.querySelector(`#correct_${id}`).value, points: parseInt(box.querySelector(`#pts_${id}`).value) };
            if(type === 'choice') q.opts = [box.querySelector('.opt1').value, box.querySelector('.opt2').value, box.querySelector('.opt3').value, box.querySelector('.opt4').value];
            questions.push(q);
        });
        db.ref('models').push({ title, questions, shuffle: document.getElementById('shuffleOpt').checked });
        Swal.fire('تم الحفظ بنجاح', '', 'success');
    }

    function fetchModels() {
        db.ref('models').on('value', snap => {
            const list = document.getElementById('modelsList'); list.innerHTML = '';
            snap.forEach(c => { list.innerHTML += `<div class="card"><b>${c.val().title}</b> <button class="btn" style="background:#059669; color:white" onclick="viewRes('${c.key}')">النتائج</button> <div id="res_${c.key}" class="hidden"></div></div>`; });
        });
    }

    function viewRes(id) {
        const div = document.getElementById('res_'+id); div.classList.toggle('hidden');
        db.ref('results/'+id).once('value', s => {
            let h = `<table><tr><th>الاسم</th><th>الدرجة</th></tr>`;
            s.forEach(r => { h += `<tr><td>${r.val().name}</td><td>${r.val().score}</td></tr>`; });
            div.innerHTML = h + `</table>`;
        });
    }

    // --- الطالب والتصحيح ---
    let currentQuiz = null;
    function loadStudentQuiz(id) {
        db.ref('models/'+id).once('value', s => { currentQuiz = s.val(); document.getElementById('stQuizTitle').innerText = currentQuiz.title; });
    }

    function startStudentQuiz() {
        document.getElementById('studentLogin').classList.add('hidden');
        document.getElementById('stQuizArea').classList.remove('hidden');
        const area = document.getElementById('stQuestions');
        currentQuiz.questions.forEach((q, i) => {
            let h = `<div class="card"><h4>${q.text} <span style="font-size:0.8rem; color:#666">(${q.points} درجة)</span></h4>`;
            if(q.type === 'choice') {
                q.opts.forEach(o => { if(o) h += `<label style="display:block"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`; });
            } else { h += `<input type="text" class="st-ans" placeholder="إجابتك...">`; }
            area.innerHTML += h + `</div>`;
        });
    }

    function submitStudentAnswers() {
        let totalScore = 0; let maxScore = 0;
        let summaryHtml = "";
        const cards = document.querySelectorAll('#stQuestions .card');

        currentQuiz.questions.forEach((q, i) => {
            const card = cards[i];
            const radio = card.querySelector('input:checked');
            const text = card.querySelector('.st-ans');
            const studentAns = (radio ? radio.value : (text ? text.value : "")).trim();
            const isCorrect = studentAns === q.correct.trim();
            
            maxScore += q.points;
            if(isCorrect) totalScore += q.points;

            summaryHtml += `
                <div class="summary-card ${isCorrect ? 'summary-correct' : 'summary-wrong'}">
                    <b>السؤال:</b> ${q.text}<br>
                    <b>إجابتك:</b> ${studentAns || "لم تجب"}<br>
                    ${!isCorrect ? `<b>الإجابة الصحيحة:</b> ${q.correct}<br>` : ""}
                    <b>الدرجة المستحقة:</b> ${isCorrect ? q.points : 0} من ${q.points}
                </div>`;
        });

        const finalScoreStr = `${totalScore} من ${maxScore}`;
        db.ref('results/'+quizId).push({ name: document.getElementById('stName').value, class: document.getElementById('stClass').value, score: finalScoreStr });

        document.getElementById('stQuizArea').classList.add('hidden');
        document.getElementById('resultSummary').classList.remove('hidden');
        document.getElementById('totalScoreDisp').innerText = `درجتك النهائية: ${finalScoreStr}`;
        document.getElementById('summaryDetails').innerHTML = summaryHtml;
    }
</script>
</body>
</html>
