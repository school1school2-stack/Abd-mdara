<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي | مدعوم بـ Gemini</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --gemini-gradient: linear-gradient(135deg, #4285f4, #9b72cb, #d96570);
            --primary: #7f1d1d; --bg: #f0f4f8; --dark: #1a1f2e; --success: #10b981; --accent: #3b82f6; 
        }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #334155; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        
        /* تصميم بطاقات Gemini للأسئلة */
        .q-card-gemini {
            background: white; border-radius: 24px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(66, 133, 244, 0.1);
            position: relative; overflow: hidden; transition: transform 0.3s ease;
        }
        .q-card-gemini:hover { transform: translateY(-5px); }
        .q-card-gemini::before {
            content: ''; position: absolute; top: 0; right: 0; width: 6px; height: 100%;
            background: var(--gemini-gradient);
        }

        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .q-type-badge { 
            background: #f1f5f9; padding: 6px 15px; border-radius: 12px; 
            font-size: 0.85rem; font-weight: 700; color: #475569; display: flex; align-items: center; gap: 8px;
        }
        .q-type-badge i { color: #3b82f6; }

        /* تنسيق المدخلات */
        input, select, textarea { 
            width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; 
            border-radius: 15px; font-family: 'Cairo'; transition: 0.3s; background: #fcfcfc;
        }
        input:focus { border-color: #9b72cb; outline: none; box-shadow: 0 0 0 4px rgba(155, 114, 203, 0.1); }
        
        .correct-answer-input { border: 2px solid var(--success) !important; background: #f0fdf4; font-weight: bold; }
        .points-badge { background: var(--gemini-gradient); color: white; padding: 5px 15px; border-radius: 10px; font-size: 0.9rem; font-weight: bold; }

        /* الهيدر الاحترافي */
        .admin-header { 
            background: var(--dark); color: white; padding: 40px 20px; text-align: center; 
            position: relative; border-bottom: 8px solid transparent; border-image: var(--gemini-gradient) 1;
        }
        .gemini-sparkle { color: #9b72cb; margin-left: 10px; }

        .btn { padding: 14px 25px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-gemini { background: var(--gemini-gradient); color: white; width: 100%; font-size: 1.1rem; }
        .btn-gemini:hover { opacity: 0.9; transform: scale(1.02); }

        /* جدول النتائج الاحترافي */
        .results-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .results-table td { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); text-align: center; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="adminView" class="hidden">
    <div class="admin-header">
        <h1>منصة الذكاء اللغوي <i class="fa-solid fa-wand-magic-sparkles gemini-sparkle"></i></h1>
        <p>بإشراف أ. عبدالعزيز الفيفي | تصميم Gemini المتقدم</p>
    </div>
    
    <div class="container">
        <div class="q-card-gemini">
            <h3><i class="fa-solid fa-sliders"></i> إعدادات النموذج الذكي</h3>
            <input type="hidden" id="currentModelId">
            <input type="text" id="quizTitle" placeholder="عنوان الاختبار (مثال: مهارات اللغة العربية)..." style="font-size: 1.2rem; font-weight: bold;">
            <div style="display:flex; gap:20px; margin-top:15px;">
                <label><input type="checkbox" id="shuffleOpt" style="width: auto;"> 🔀 خلط الأسئلة</label>
                <label><input type="checkbox" id="lockOpt" checked style="width: auto;"> 🔒 حماية (محاولة واحدة)</label>
            </div>
        </div>

        <div id="questionsArea"></div>
        
        <button class="btn" style="background:var(--dark); color:white; width:100%; margin-bottom:30px;" onclick="addQuestion()">
            <i class="fa-solid fa-plus-circle"></i> إضافة سؤال ذكي جديد
        </button>

        <div class="q-card-gemini" style="background: rgba(255,255,255,0.7);">
            <button class="btn btn-gemini" onclick="saveToCloud()">
                <i class="fa-solid fa-cloud-arrow-up"></i> حفظ النموذج في السحابة الذكية
            </button>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px;">
                <button class="btn" style="background:#0284c7; color:white" onclick="generateLink()"><i class="fa-solid fa-link"></i> رابط الطلاب</button>
                <button class="btn" style="background:#64748b; color:white" onclick="newQuiz()"><i class="fa-solid fa-file-circle-plus"></i> نموذج جديد</button>
            </div>
        </div>

        <div class="q-card-gemini">
            <h3><i class="fa-solid fa-chart-line"></i> لوحة مراقبة النتائج</h3>
            <div id="modelsList">جاري الاتصال بالسحابة...</div>
        </div>
    </div>
</div>

<div id="studentView" class="hidden">
    <div class="container">
        <div class="q-card-gemini" id="studentLogin" style="text-align:center; margin-top:50px;">
            <h2 id="stQuizTitle"><i class="fa-solid fa-spinner fa-spin"></i></h2>
            <p>يرجى إدخال بياناتك بدقة للبدء</p>
            <input type="text" id="stName" placeholder="الاسم الثلاثي للطالب">
            <input type="text" id="stClass" placeholder="الفصل">
            <button class="btn btn-gemini" onclick="startStudentQuiz()">بدء التحدي الآن</button>
        </div>
        <div id="stQuizArea" class="hidden">
            <div id="stQuestions"></div>
            <button class="btn btn-gemini" onclick="submitStudentAnswers()">إرسال وتصحيح آلي</button>
        </div>
        <div id="resultSummary" class="hidden q-card-gemini">
            <h2 style="text-align:center">🏁 تقرير الأداء التفصيلي</h2>
            <div id="totalScoreDisp" style="text-align:center; font-size:2rem; font-weight:900; color:var(--primary); margin:20px 0;"></div>
            <div id="summaryDetails"></div>
            <button class="btn btn-gemini" onclick="location.reload()">العودة للرئيسية</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let qCount = 0;
    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('id');

    if (quizId) { document.getElementById('studentView').classList.remove('hidden'); loadStudentQuiz(quizId); }
    else { document.getElementById('adminView').classList.remove('hidden'); fetchModels(); }

    function addQuestion(data = null) {
        qCount++;
        const qId = `q_${qCount}`;
        const html = `
            <div class="q-card-gemini q-box" id="${qId}">
                <div class="q-header">
                    <div class="q-type-badge"><i class="fa-solid fa-layer-group"></i> نوع السؤال</div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:0.8rem; font-weight:bold;">الدرجة:</span>
                        <input type="number" id="pts_${qCount}" class="points-badge" style="width:60px; margin:0;" value="${data?.points||1}">
                    </div>
                </div>
                <select class="q-type" onchange="renderQInputs(this, ${qCount})">
                    <option value="text" ${data?.type=='text'?'selected':''}>📝 سؤال وجواب نصي</option>
                    <option value="choice" ${data?.type=='choice'?'selected':''}>🔘 اختيار من متعدد</option>
                    <option value="parsing" ${data?.type=='parsing'?'selected':''}>⚖️ إعراب وتصحيح</option>
                    <option value="extract" ${data?.type=='extract'?'selected':''}>🔍 استخراج من نص</option>
                </select>
                <div id="inputs_${qCount}"></div>
                <input type="text" class="correct-answer-input" id="correct_${qCount}" placeholder="✓ ضع الإجابة النموذجية هنا للتصحيح الآلي" value="${data?.correct||''}">
                <button class="btn" style="background:#fee2e2; color:#ef4444; width:auto; margin-top:15px;" onclick="document.getElementById('${qId}').remove()"><i class="fa-solid fa-trash"></i> حذف السؤال</button>
            </div>`;
        document.getElementById('questionsArea').insertAdjacentHTML('beforeend', html);
        renderQInputs(document.querySelector(`#${qId} select`), qCount, data);
    }

    function renderQInputs(select, id, data = null) {
        const target = document.getElementById(`inputs_${id}`);
        const type = select.value;
        let html = `<input type="text" class="q-text" placeholder="اكتب السؤال النحوي هنا..." value="${data?.text||''}">`;
        if(type === 'extract') html = `<textarea class="q-text" placeholder="ضع القطعة أو النص هنا...">${data?.text||''}</textarea><input type="text" class="q-sub" placeholder="ما المطلوب استخراجه؟" value="${data?.sub||''}">`;
        if(type === 'choice') html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><input type="text" class="opt1" placeholder="خيار 1" value="${data?.opts?.[0]||''}"> <input type="text" class="opt2" placeholder="خيار 2" value="${data?.opts?.[1]||''}"> <input type="text" class="opt3" placeholder="خيار 3" value="${data?.opts?.[2]||''}"> <input type="text" class="opt4" placeholder="خيار 4" value="${data?.opts?.[3]||''}"></div>`;
        target.innerHTML = html;
    }

    function saveToCloud() {
        const id = document.getElementById('currentModelId').value;
        const title = document.getElementById('quizTitle').value;
        const boxes = document.querySelectorAll('.q-box');
        if(!title) return Swal.fire('تنبيه', 'أدخل عنوان الاختبار', 'warning');
        let questions = [];
        boxes.forEach(box => {
            const qid = box.id.split('_')[1];
            const type = box.querySelector('.q-type').value;
            let q = { type, text: box.querySelector('.q-text').value, points: parseInt(box.querySelector(`#pts_${qid}`).value), correct: box.querySelector(`#correct_${qid}`).value.trim() };
            if(type==='extract') q.sub = box.querySelector('.q-sub').value;
            if(type==='choice') q.opts = [box.querySelector('.opt1').value, box.querySelector('.opt2').value, box.querySelector('.opt3').value, box.querySelector('.opt4').value];
            questions.push(q);
        });
        const qData = { title, questions, shuffle: document.getElementById('shuffleOpt').checked, lock: document.getElementById('lockOpt').checked };
        if(id) db.ref('models/'+id).update(qData).then(() => Swal.fire('تم التحديث بنجاح', '', 'success'));
        else db.ref('models').push(qData).then(() => { Swal.fire('تم الحفظ السحابي', '', 'success'); newQuiz(); });
    }

    function fetchModels() {
        db.ref('models').on('value', (snap) => {
            const list = document.getElementById('modelsList'); list.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                list.innerHTML += `<div class="q-card-gemini" style="padding:15px; margin-bottom:10px; border-right:none; border:1px solid #eee">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:900;">${m.title}</span>
                        <div style="display:flex; gap:5px">
                            <button onclick="loadToEdit('${child.key}')" class="btn btn-action" style="background:var(--accent)"><i class="fa-solid fa-pen"></i></button>
                            <button onclick="viewResults('${child.key}')" class="btn btn-action" style="background:var(--success)"><i class="fa-solid fa-eye"></i></button>
                            <button onclick="deleteModel('${child.key}')" class="btn btn-action" style="background:var(--error)"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div id="res_box_${child.key}" class="hidden" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;"></div>
                </div>`;
            });
        });
    }

    function viewResults(mId) {
        const resDiv = document.getElementById('res_box_'+mId); resDiv.classList.toggle('hidden');
        if(!resDiv.classList.contains('hidden')) {
            db.ref('results/'+mId).once('value', (snap) => {
                if(!snap.exists()) { resDiv.innerHTML = 'لا توجد نتائج'; return; }
                let tableHtml = `<table class="results-table">`;
                snap.forEach(c => {
                    const r = c.val();
                    tableHtml += `<tr><td><b>${r.name}</b></td><td>${r.class}</td><td><span class="points-badge">${r.score}</span></td></tr>`;
                });
                resDiv.innerHTML = tableHtml + `</table>`;
            });
        }
    }

    let currentQuiz = null;
    function loadStudentQuiz(id) {
        db.ref('models/'+id).once('value', snap => { if(snap.exists()){ currentQuiz = snap.val(); document.getElementById('stQuizTitle').innerText = currentQuiz.title; }});
    }

    function startStudentQuiz() {
        if(!document.getElementById('stName').value || !document.getElementById('stClass').value) return Swal.fire('تنبيه','أكمل بياناتك','info');
        document.getElementById('studentLogin').classList.add('hidden');
        document.getElementById('stQuizArea').classList.remove('hidden');
        const area = document.getElementById('stQuestions'); area.innerHTML = '';
        let qs = [...currentQuiz.questions]; if(currentQuiz.shuffle) qs = qs.sort(()=>Math.random()-0.5);
        qs.forEach((q, i) => {
            let h = `<div class="q-card-gemini student-q-card" data-idx="${currentQuiz.questions.indexOf(q)}"><h3>${q.text} <small>(${q.points} ن)</small></h3>`;
            if(q.type==='extract') h = `<div class="q-card-gemini student-q-card" data-idx="${currentQuiz.questions.indexOf(q)}"><p style="background:#f8fafc;padding:20px;border-radius:15px;border-right:5px solid #4285f4;">${q.text}</p><h3>${q.sub} <small>(${q.points} ن)</small></h3>`;
            if(q.type==='choice') {
                q.opts.forEach(o => { if(o) h += `<label style="display:block; margin:15px 0; cursor:pointer;"><input type="radio" name="q${i}" value="${o}" style="width:auto; margin-left:10px;"> ${o}</label>`; });
            } else { h += `<input type="text" class="ans-input" placeholder="اكتب إجابتك هنا بوضوح...">`; }
            area.innerHTML += h + `</div>`;
        });
    }

    function submitStudentAnswers() {
        let totalScore = 0; let maxScore = 0; let summaryHtml = "";
        document.querySelectorAll('.student-q-card').forEach((card) => {
            const q = currentQuiz.questions[card.getAttribute('data-idx')];
            const studentAns = (card.querySelector('input:checked')?.value || card.querySelector('.ans-input')?.value || "").trim();
            const isCorrect = studentAns === q.correct;
            maxScore += q.points; if(isCorrect) totalScore += q.points;
            summaryHtml += `<div class="q-card-gemini" style="border-right: 6px solid ${isCorrect?'#10b981':'#ef4444'}">
                <b>السؤال:</b> ${q.type==='extract'?q.sub:q.text}<br>
                <b>إجابتك:</b> ${studentAns || "لم تجب"}<br>
                ${!isCorrect ? `<span style="color:#ef4444"><b>الصواب:</b> ${q.correct}</span>` : '<span style="color:#10b981">✓ إجابة صحيحة</span>'}
            </div>`;
        });
        const scoreStr = `${totalScore} من ${maxScore}`;
        db.ref('results/'+quizId).push({ name: document.getElementById('stName').value, class: document.getElementById('stClass').value, score: scoreStr, time: Date.now() }).then(() => {
            document.getElementById('stQuizArea').classList.add('hidden');
            document.getElementById('resultSummary').classList.remove('hidden');
            document.getElementById('totalScoreDisp').innerText = `درجتك: ${scoreStr}`;
            document.getElementById('summaryDetails').innerHTML = summaryHtml;
        });
    }

    function generateLink() {
        const id = document.getElementById('currentModelId').value;
        if(!id) return Swal.fire('خطأ','احفظ الاختبار أولاً','error');
        const link = window.location.origin + window.location.pathname + '?id=' + id;
        Swal.fire({ title: 'رابط الطالب الذكي', html: `<input value="${link}" id="copyL" style="width:100%; text-align:center; padding:10px;">`, confirmButtonText: 'نسخ' }).then(() => { document.getElementById('copyL').select(); document.execCommand('copy'); });
    }

    function newQuiz() { document.getElementById('currentModelId').value=''; document.getElementById('quizTitle').value=''; document.getElementById('questionsArea').innerHTML=''; qCount=0; }
    function loadToEdit(id) { db.ref('models/'+id).once('value', snap => { const m = snap.val(); newQuiz(); document.getElementById('currentModelId').value=id; document.getElementById('quizTitle').value=m.title; m.questions.forEach(q => addQuestion(q)); }); }
    function deleteModel(id) { if(confirm('هل تريد حذف هذا النموذج نهائياً؟')) db.ref('models/'+id).remove(); }
</script>
</body>
</html>
