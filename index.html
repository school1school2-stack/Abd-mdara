<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - النظام الموحد الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --royal-blue: #1e3a8a; --q-red: #ef4444; --bg-page: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-page); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .user-header {
            width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; 
            margin-bottom: 20px; box-sizing: border-box;
        }
        .header-right { text-align: right; } .header-left { text-align: left; }
        .user-name { margin: 0; color: var(--royal-blue); font-weight: 900; font-size: 1.5rem; }
        .school-name { margin: 0; color: #64748b; font-weight: 700; font-size: 1rem; }
        .logo-box { background: var(--royal-blue); width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }

        /* مفتاح التبديل بين القدرات والكفايات */
        .mode-switcher { background: white; padding: 10px 20px; border-radius: 50px; display: flex; gap: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; border: 2px solid #e2e8f0; }
        .mode-btn { padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 800; transition: 0.3s; border: none; font-family: 'Cairo'; background: #f1f5f9; color: #64748b; }
        .mode-btn.active { background: var(--royal-blue); color: white; }

        .container { width: 100%; max-width: 850px; padding-bottom: 120px; }
        .question-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; }
        .question-card::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }
        .unsolved { border: 2px solid #ef4444 !important; background: #fff1f2 !important; }

        .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .q-number-badge { background: var(--royal-blue); color: white; padding: 2px 15px; border-radius: 50px; font-weight: 900; font-size: 0.9rem; }
        .type-select { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; font-weight: 700; font-family: 'Cairo'; cursor: pointer; }

        .estieab-box { background: #fff9c4 !important; border: 2px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 15px; color: #000; font-weight: 700; line-height: 1.8; width: 100%; box-sizing: border-box; text-align: right; min-height: 100px; height: auto; white-space: pre-wrap; }
        .q-text-input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--royal-blue); font-weight: 900; font-size: 1.3rem; margin-bottom: 15px; outline: none; text-align: right; box-sizing: border-box; }
        
        .student-answer-area { background: #f0fdf4; border: 2px dashed #22c55e; border-radius: 12px; padding: 15px; margin-top: 10px; }
        .student-input { width: 100%; border: none; background: transparent; font-family: 'Cairo'; font-weight: 700; font-size: 1.2rem; color: #166534; outline: none; text-align: right; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 12px; box-sizing: border-box; }
        .opt-word { width: 100%; border: none; outline: none; font-weight: 900; color: #000; background: transparent; text-align: right; font-family: 'Cairo'; }

        .pair-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #fff1f2; padding: 15px; border-radius: 12px; border: 1.5px dashed #fca5a5; width: 100%; box-sizing: border-box; }
        .pair-word { width: 45%; text-align: center; border: none; background: white; padding: 10px; border-radius: 8px; color: var(--q-red); font-weight: 900; font-size: 1.3rem; }

        .correct-ans-box { margin-top: 15px; padding: 10px; background: #f0fdf4; border-radius: 10px; border: 1px solid #bbf7d0; text-align: right; }
        .correct-input { width: 100%; background: transparent; border: none; outline: none; color: #166534; font-weight: 900; text-align: right; font-family: 'Cairo'; }

        /* شريط التحكم (تطابق مع الصورة 1000206129.jpg) */
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: nowrap; gap: 8px; z-index: 1000; background: #1e293b; padding: 10px 15px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); align-items: center; width: max-content; }
        .btn { border: none; padding: 10px 18px; border-radius: 30px; font-weight: 800; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-family: 'Cairo'; font-size: 0.9rem; white-space: nowrap; }
        .btn-add { background: #3b82f6; } .btn-save { background: #a855f7; } .btn-load { background: #4f46e5; }
        .btn-link { background: #06b6d4; } .btn-del { background: #f97316; } .btn-pdf { background: #ef4444; }
        .btn-img { background: #10b981; } .btn-clear { background: #64748b; padding: 10px; border-radius: 50%; }

        body.student-mode .controls, body.student-mode .remove-btn, body.student-mode .type-select, body.student-mode .correct-ans-box { display: none !important; }
        body.student-mode .q-text-input, body.student-mode .opt-word, body.student-mode .pair-word { pointer-events: none; border: none; background: transparent !important; }
        body.student-mode .selected-opt { background: #dbeafe !important; border: 2px solid #3b82f6 !important; }
        body.locked-mode .opt-pair-row { pointer-events: none !important; }

        #report-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 850px; height: 85%; background: white; z-index: 2000; border-radius: 20px; padding: 30px; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1999; }
    </style>
</head>
<body>

    <div id="modal-overlay" onclick="closeReport()"></div>
    <div id="report-modal">
        <h2 style="text-align: center; color: var(--royal-blue);">تقرير أداء الطالب 🎯</h2>
        <div id="score-summary" style="text-align: center; font-size: 1.4rem; font-weight: 900; margin: 20px 0;"></div>
        <table class="report-table">
            <thead>
                <tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الصحيحة</th><th>النتيجة</th></tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button class="btn" style="background:#64748b; width:100%; margin-top:20px;" onclick="closeReport()">إغلاق التقرير</button>
    </div>

    <div class="user-header" id="main-header">
        <div class="header-right"><h2 class="user-name">أ. عبدالعزيز الفيفي</h2></div>
        <div class="header-center"><div class="logo-box"><i class="fas fa-award"></i></div></div>
        <div class="header-left"><p class="school-name">ثانوية الأمير عبدالمجيد 😉</p></div>
    </div>

    <div class="mode-switcher">
        <button id="btn-qudrat" class="mode-btn active" onclick="switchMode('qudrat')">قدرات لفظي</button>
        <button id="btn-kifayat" class="mode-btn" onclick="switchMode('kifayat')">كفايات لغوية</button>
    </div>

    <div class="container" id="quiz-content"></div>

    <div id="student-actions" style="display: none; text-align: center; margin-bottom: 50px;">
        <button id="main-grade-btn" class="btn" style="background:#10b981; padding:15px 30px" onclick="gradeExam()"><i class="fas fa-graduation-cap"></i> انتهيت.. أرني النتيجة</button>
        <button class="btn" style="background:#64748b; padding:15px 30px;" onclick="resetExam()"><i class="fas fa-redo"></i> مسح الحل وإعادة الاختبار</button>
    </div>

    <div class="controls" id="admin-controls">
        <button class="btn btn-clear" title="مسح الكل" onclick="clearAll()"><i class="fas fa-eraser"></i></button>
        <button class="btn btn-img" onclick="saveAsImages()"><i class="fas fa-image"></i> صور</button>
        <button class="btn btn-pdf" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn btn-del" onclick="deleteFromCloud()"><i class="fas fa-trash-alt"></i> حذف</button>
        <button class="btn btn-link" onclick="generateStudentLink()"><i class="fas fa-link"></i> رابط الطلاب</button>
        <button class="btn btn-load" onclick="loadFromCloud()"><i class="fas fa-cloud-download-alt"></i> فتح</button>
        <button class="btn btn-save" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i> حفظ</button>
        <button class="btn btn-add" onclick="addQuestion()"><i class="fas fa-plus"></i> سؤال جديد</button>
    </div>

    <script>
        let currentMode = 'qudrat';
        const qudratTypes = { 'normal': 'إكمال جمل / خطأ سياقي', 'tanazor': 'تناظر لفظي ( : )', 'estieab': 'استيعاب المقروء', 'shaza': 'المفردة الشاذة' };
        const kifayatTypes = { 'mathal': 'مثّل في جملة', 'aerab': 'أعرب ما تحته خط', 'akmel': 'أكمل الفراغ', 'istakhrij': 'استخرج من النص', 'sah': 'صح وخطأ' };

        const firebaseConfig = {
            apiKey: "AIzaSyAVrIim7aXjg0hGrMk0qVrXT8geRIpHoBk",
            authDomain: "youy-apps.firebaseapp.com",
            databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
            projectId: "youy-apps",
            storageBucket: "youy-apps.firebasestorage.app",
            messagingSenderId: "690543747528",
            appId: "1:690543747528:web:10c85ef8c93b79596620fd"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        window.onload = loadLocal;

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            document.getElementById('quiz-content').innerHTML = "";
            addQuestion();
        }

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            card.className = 'question-card';
            const typeMap = currentMode === 'qudrat' ? qudratTypes : kifayatTypes;
            const type = data ? data.type : Object.keys(typeMap)[0];

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="card-meta"><span class="q-number-badge"></span>
                        <select class="type-select" onchange="toggleType(this)">
                            ${Object.entries(typeMap).map(([k,v])=>`<option value="${k}" ${type===k?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </div>
                    <i class="fas fa-times-circle" style="color:#cbd5e1; cursor:pointer;" onclick="this.closest('.question-card').remove();updateNumbers();saveAll();"></i>
                </div>
                <div class="q-area">${renderQArea(type, data)}</div>
                <div class="ans-area">${renderAnsArea(type, data)}</div>
                ${currentMode === 'qudrat' ? `<div class="correct-ans-box"><input type="text" placeholder="حرف الإجابة فقط" class="correct-input ans-val" value="${data?data.ans||'':''}" oninput="saveAll()"></div>` : ''}
            `;
            container.appendChild(card);
            
            card.querySelectorAll('.opt-pair-row').forEach(row => {
                row.onclick = () => { if (document.body.classList.contains('student-mode') && !document.body.classList.contains('locked-mode')) { 
                    card.querySelectorAll('.opt-pair-row').forEach(r => r.classList.remove('selected-opt')); row.classList.add('selected-opt'); card.classList.remove('unsolved');
                }};
            });
            updateNumbers();
            if(!document.body.classList.contains('student-mode')) saveAll();
        }

        function renderQArea(t, d) {
            if (t === 'tanazor') return `<div class="pair-row"><input type="text" class="pair-word t1" placeholder="1" value="${d?d.text1:''}" oninput="saveAll()"><span style="color:red; font-weight:900;"> : </span><input type="text" class="pair-word t2" placeholder="2" value="${d?d.text2:''}" oninput="saveAll()"></div>`;
            if (t === 'estieab' || t === 'istakhrij') return `<div class="estieab-box" contenteditable="true" oninput="saveAll()" placeholder="ضع النص هنا...">${d?d.text_area||'' : ''}</div><input type="text" class="q-text-input q-main" placeholder="السؤال المطلوب..." value="${d?d.text:''}" oninput="saveAll()">`;
            if (t === 'aerab') return `<input type="text" class="q-text-input q-main" style="text-decoration:underline; text-underline-offset:8px;" placeholder="اكتب الجملة وضع خطاً تحت الكلمات..." value="${d?d.text:''}" oninput="saveAll()">`;
            return `<input type="text" class="q-text-input q-main" placeholder="اكتب السؤال هنا..." value="${d?d.text:''}" oninput="saveAll()">`;
        }

        function renderAnsArea(t, d) {
            if (currentMode === 'qudrat') {
                let h = '<div class="options-grid">'; const labels = ['أ','ب','ج','د'];
                for(let i=0; i<4; i++) {
                    if(t==='tanazor') h+=`<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word op1" placeholder="1" value="${d?.opt_pair_val1?.[i]||''}"><span style="color:red; font-weight:900"> : </span><input type="text" class="opt-word op2" placeholder="2" value="${d?.opt_pair_val2?.[i]||''}"></div>`;
                    else h+=`<div class="opt-pair-row"><span>${labels[i]}</span><input type="text" class="opt-word opt" style="margin-right:10px" placeholder="خيار ${labels[i]}" value="${d?.opts?.[i]||''}"></div>`;
                }
                return h + '</div>';
            } else {
                return `<div class="student-answer-area"><input type="text" placeholder="إجابة الطالب هنا..." class="student-input s-ans" value="${d?d.studentAns||'':''}" oninput="saveAll()"></div>`;
            }
        }

        function toggleType(s) { const c = s.closest('.question-card'); c.querySelector('.q-area').innerHTML = renderQArea(s.value,null); c.querySelector('.ans-area').innerHTML = renderAnsArea(s.value,null); saveAll(); }
        function updateNumbers() { document.querySelectorAll('.q-number-badge').forEach((b, i) => b.innerText = `السؤال ${i+1}`); }

        function gradeExam() {
            const cards = document.querySelectorAll('.question-card');
            let s = 0; const report = document.getElementById('report-body'); report.innerHTML = "";
            document.body.classList.add('locked-mode'); document.getElementById('main-grade-btn').disabled = true;
            cards.forEach((c, i) => {
                const sel = c.querySelector('.selected-opt span')?.innerText || c.querySelector('.s-ans')?.value || "لم يحل";
                const cor = c.querySelector('.ans-val')?.value.trim().toUpperCase() || "مراجعة المعلم";
                const isCor = sel === cor; if(isCor) s++;
                const qTxt = c.querySelector('.q-main')?.value || (c.querySelector('.t1')?.value + " : " + c.querySelector('.t2')?.value) || "سؤال";
                report.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right">${qTxt}</td><td>${sel}</td><td>${cor}</td><td>${isCor?'✅':'❌'}</td></tr>`;
            });
            document.getElementById('report-modal').style.display = 'block'; document.getElementById('modal-overlay').style.display = 'block';
        }

        function closeReport() { document.getElementById('report-modal').style.display = 'none'; document.getElementById('modal-overlay').style.display = 'none'; }
        function resetExam() { location.reload(); }

        function saveAll() {
            const qs = []; document.querySelectorAll('.question-card').forEach(c => {
                const t = c.querySelector('.type-select').value;
                let d = { type: t, text: c.querySelector('.q-main')?.value || "", ans: c.querySelector('.ans-val')?.value || "" };
                if (currentMode === 'qudrat') {
                    if (t === 'tanazor') { d.text1 = c.querySelector('.t1').value; d.text2 = c.querySelector('.t2').value; d.opt_pair_val1 = Array.from(c.querySelectorAll('.op1')).map(i => i.value); d.opt_pair_val2 = Array.from(c.querySelectorAll('.op2')).map(i => i.value); }
                    else { d.opts = Array.from(c.querySelectorAll('.opt')).map(i => i.value); if(t==='estieab') d.text_area = c.querySelector('.estieab-box').innerText; }
                } else {
                    d.studentAns = c.querySelector('.s-ans')?.value || "";
                    if (t === 'istakhrij') d.text_area = c.querySelector('.estieab-box').innerText;
                }
                qs.push(d);
            });
            localStorage.setItem('fifi_ultimate_v1', JSON.stringify({ mode: currentMode, data: qs }));
        }

        function loadLocal() {
            const urlParams = new URLSearchParams(window.location.search);
            const examId = urlParams.get('exam');
            if (examId) { document.body.classList.add('student-mode'); document.getElementById('student-actions').style.display = 'block'; loadSpecificExam(examId); }
            else {
                const s = localStorage.getItem('fifi_ultimate_v1');
                if(s) { const obj = JSON.parse(s); currentMode = obj.mode; document.getElementById('quiz-content').innerHTML = ""; obj.data.forEach(q=>addQuestion(q)); }
            }
        }

        function clearAll() { localStorage.clear(); location.reload(); }
        async function saveToCloud() { const n = prompt("اسم النموذج:"); if(n) { await db.ref(currentMode + '/' + n).set({ data: JSON.parse(localStorage.getItem('fifi_ultimate_v1')).data, date: new Date().toLocaleString() }); alert("تم الحفظ!"); } }
        function loadFromCloud() { db.ref(currentMode).once('value', s => { const ms = s.val(); if(ms) { const c = prompt("اختر:\n" + Object.keys(ms).join("\n")); if(c && ms[c]) { localStorage.setItem('fifi_ultimate_v1', JSON.stringify({ mode: currentMode, data: ms[c].data })); loadLocal(); } } }); }
        function generateStudentLink() { const n = prompt("اسم النموذج:"); if(n) prompt("رابط الطلاب:", window.location.origin + window.location.pathname + "?exam=" + encodeURIComponent(n)); }
        async function deleteFromCloud() { const n = prompt("اسم النموذج:"); if(n && confirm("حذف؟")) db.ref(currentMode + '/' + n).remove().then(()=>alert("تم الحذف!")); }
        function loadSpecificExam(id) { db.ref(currentMode + '/' + id).once('value', s => { const exam = s.val(); if (exam) { document.getElementById('quiz-content').innerHTML = ""; exam.data.forEach(q => addQuestion(q)); } }); }

        // --- حقن برمجية الحفظ "طبق الأصل" الأصلية والمتقنة ---
        async function saveAsImages() {
            const cards = Array.from(document.querySelectorAll('.question-card'));
            for (let i = 0; i < cards.length; i += 3) {
                const area = document.createElement('div');
                area.style = "width:850px; padding:30px; background:#f8fafc; position:absolute; top:-9999px; right:0; direction:rtl;";
                area.appendChild(document.getElementById('main-header').cloneNode(true));
                cards.slice(i, i+3).forEach((orig, idx) => {
                    const clone = orig.cloneNode(true);
                    const type = orig.querySelector('.type-select').value;
                    clone.querySelector('.card-meta').innerHTML = `<span class="q-number-badge">السؤال ${i+idx+1}</span> <span style="margin-right:15px; font-weight:900; color:#3b82f6;">${(currentMode==='qudrat'?qudratTypes:kifayatTypes)[type]}</span>`;
                    
                    clone.querySelectorAll('input, .estieab-box').forEach((inp) => {
                        const val = inp.value || inp.innerText;
                        const style = window.getComputedStyle(inp);
                        const div = document.createElement('div'); div.innerText = val;
                        div.style = `background:${style.backgroundColor}; color:${style.color}; padding:12px; border-radius:12px; font-weight:900; font-size:1.3rem; border:${style.border}; margin-bottom:12px; text-align:right;`;
                        if(type === 'aerab' && inp.classList.contains('q-main')) div.style.textDecoration = "underline";
                        inp.replaceWith(div);
                    });
                    clone.querySelectorAll('.remove-btn, .type-select, .fa-times-circle, .correct-ans-box').forEach(e => e.remove());
                    area.appendChild(clone);
                });
                document.body.appendChild(area);
                await html2canvas(area, { scale: 2.5, useCORS: true }).then(canvas => {
                    const link = document.createElement('a'); link.download = `اختبار_الفيفي_${currentMode}_${Math.floor(i/3)+1}.png`;
                    link.href = canvas.toDataURL(); link.click();
                });
                document.body.removeChild(area);
            }
        }

        function saveAsPDF() { const c = document.getElementById('quiz-content'); html2pdf().from(c).save(); }
    </script>
</body>
</html>
