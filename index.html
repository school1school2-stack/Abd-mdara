<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي | النظام المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #7f1d1d; --bg: #f8fafc; --dark: #1e293b; --success: #059669; --error: #dc2626; --accent: #0284c7; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #334155; }
        .container { max-width: 950px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-right: 8px solid var(--primary); }
        .admin-header { background: var(--dark); color: white; padding: 30px; text-align: center; border-bottom: 6px solid var(--primary); }
        
        /* تصميم جدول النتائج الاحترافي */
        .res-container { margin-top: 15px; padding: 20px; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 15px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02); }
        .results-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        .results-table th { background: #f1f5f9; color: var(--dark); padding: 15px; font-weight: 900; text-align: center; border-bottom: 2px solid #e2e8f0; }
        .results-table tr { transition: 0.3s; }
        .results-table td { padding: 15px; text-align: center; background: #fff; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .results-table tr:hover td { background: #f8fafc; transform: scale(1.01); }
        .results-table td:first-child { border-right: 1px solid #f1f5f9; border-radius: 0 12px 12px 0; }
        .results-table td:last-child { border-left: 1px solid #f1f5f9; border-radius: 12px 0 0 12px; }
        
        .score-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }
        .time-label { font-size: 0.75rem; color: #64748b; display: block; }
        .name-cell { font-weight: 700; color: var(--dark); }
        
        /* بقية الأنماط السابقة */
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 15px 0; }
        .setting-item { background: #f1f5f9; padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #cbd5e1; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-action { font-size: 0.75rem; padding: 6px 14px; margin: 2px; color: white; border-radius: 8px; }
        .q-box { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; position: relative; }
        .correct-answer-input { border: 2px solid var(--success) !important; background: #f0fdf4; }
        .points-input { width: 80px !important; display: inline-block; border: 2px solid var(--accent) !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="adminView" class="hidden">
    <div class="admin-header">
        <h1>لوحة تحكم المعلم (تصحيح ودرجات) ⚖️</h1>
        <p>أ. عبدالعزيز الفيفي - إدارة المحتوى والنتائج</p>
    </div>
    <div class="container">
        <div class="card">
            <h3>⚙️ إعدادات الاختبار</h3>
            <input type="hidden" id="currentModelId">
            <input type="text" id="quizTitle" placeholder="عنوان الاختبار...">
            <div class="setup-grid">
                <div class="setting-item"><span>🔀 خلط الأسئلة</span><input type="checkbox" id="shuffleOpt"></div>
                <div class="setting-item"><span>🔒 منع الإعادة</span><input type="checkbox" id="lockOpt" checked></div>
            </div>
        </div>

        <div id="questionsArea"></div>
        <button class="btn" style="background:var(--dark); color:white; width:100%; margin-bottom:20px;" onclick="addQuestion()">+ إضافة سؤال جديد</button>

        <div class="card" style="border-top: 5px solid var(--success);">
            <div class="setup-grid">
                <button class="btn btn-main" onclick="saveToCloud()">💾 حفظ السحابة</button>
                <button class="btn btn-main" style="background:var(--accent)" onclick="generateLink()">🔗 رابط الطلاب</button>
                <button class="btn btn-main" style="background:#64748b" onclick="newQuiz()">📄 نموذج جديد</button>
            </div>
        </div>

        <div class="card">
            <h3>📂 النماذج المحفوظة (سحابياً)</h3>
            <div id="modelsList">جاري جلب البيانات...</div>
        </div>
    </div>
</div>

<div id="studentView" class="hidden">
    <div class="container">
        <div class="card" id="studentLogin" style="text-align:center; margin-top:50px;">
            <h2 id="stQuizTitle">تحميل الاختبار...</h2>
            <input type="text" id="stName" placeholder="الاسم الثلاثي">
            <input type="text" id="stClass" placeholder="الفصل">
            <button class="btn btn-main" onclick="startStudentQuiz()">بدء الاختبار</button>
        </div>
        <div id="stQuizArea" class="hidden">
            <div id="stQuestions"></div>
            <button class="btn btn-main" onclick="submitStudentAnswers()">إرسال الإجابات ومعاينة الملخص</button>
        </div>
        <div id="resultSummary" class="hidden card">
            <h2 style="text-align:center">🏁 ملخص الأداء النهائي</h2>
            <div id="totalScoreDisp" style="text-align:center; font-size:1.5rem; font-weight:900; color:var(--primary); margin-bottom:20px;"></div>
            <div id="summaryDetails"></div>
            <button class="btn btn-main" onclick="location.reload()">إغلاق</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase من صورتك المرفقة
    const firebaseConfig = {
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let qCount = 0;
    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('id');

    if (quizId) {
        document.getElementById('studentView').classList.remove('hidden');
        loadStudentQuiz(quizId);
    } else {
        document.getElementById('adminView').classList.remove('hidden');
        fetchModels();
    }

    // منطق إضافة الأسئلة والحفظ (محفوظ كما هو)
    function addQuestion(data = null) {
        qCount++;
        const qId = `q_${qCount}`;
        const html = `
            <div class="q-box" id="${qId}">
                <div style="display:flex; justify-content:space-between;">
                    <select class="q-type" style="width:60%" onchange="renderQInputs(this, ${qCount})">
                        <option value="text" ${data?.type=='text'?'selected':''}>1. سؤال وجواب (نصي)</option>
                        <option value="true_false" ${data?.type=='true_false'?'selected':''}>2. صح وخطأ</option>
                        <option value="choice" ${data?.type=='choice'?'selected':''}>3. اختيار من متعدد</option>
                        <option value="complete" ${data?.type=='complete'?'selected':''}>4. أكمل الفراغ</option>
                        <option value="parsing" ${data?.type=='parsing'?'selected':''}>5. إعراب</option>
                        <option value="extract" ${data?.type=='extract'?'selected':''}>6. استخراج من نص</option>
                    </select>
                    <input type="number" class="points-input" id="pts_${qCount}" placeholder="درجة" value="${data?.points||1}">
                </div>
                <div id="inputs_${qCount}"></div>
                <input type="text" class="correct-answer-input" id="correct_${qCount}" placeholder="الإجابة الصحيحة (للتصحيح الآلي)" value="${data?.correct||''}">
                <button class="btn" style="background:#ef4444; color:white; font-size:0.7rem; margin-top:5px;" onclick="document.getElementById('${qId}').remove()">حذف</button>
            </div>`;
        document.getElementById('questionsArea').insertAdjacentHTML('beforeend', html);
        renderQInputs(document.querySelector(`#${qId} select`), qCount, data);
    }

    function renderQInputs(select, id, data = null) {
        const target = document.getElementById(`inputs_${id}`);
        const type = select.value;
        let html = `<input type="text" class="q-text" placeholder="السؤال" value="${data?.text||''}">`;
        if(type === 'extract') html = `<textarea class="q-text" placeholder="النص">${data?.text||''}</textarea><input type="text" class="q-sub" placeholder="السؤال المتعلق بالنص" value="${data?.sub||''}">`;
        if(type === 'choice') html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><input type="text" class="opt1" placeholder="1" value="${data?.opts?.[0]||''}"> <input type="text" class="opt2" placeholder="2" value="${data?.opts?.[1]||''}"> <input type="text" class="opt3" placeholder="3" value="${data?.opts?.[2]||''}"> <input type="text" class="opt4" placeholder="4" value="${data?.opts?.[3]||''}"></div>`;
        target.innerHTML = html;
    }

    function saveToCloud() {
        const id = document.getElementById('currentModelId').value;
        const title = document.getElementById('quizTitle').value;
        const boxes = document.querySelectorAll('.q-box');
        if(!title) return Swal.fire('تنبيه', 'أدخل العنوان', 'warning');
        let questions = [];
        boxes.forEach(box => {
            const qid = box.id.split('_')[1];
            const type = box.querySelector('.q-type').value;
            let q = { type, text: box.querySelector('.q-text').value, points: parseInt(box.querySelector(`#pts_${qid}`).value), correct: box.querySelector(`#correct_${qid}`).value.trim() };
            if(type==='extract') q.sub = box.querySelector('.q-sub').value;
            if(type==='choice') q.opts = [box.querySelector('.opt1').value, box.querySelector('.opt2').value, box.querySelector('.opt3').value, box.querySelector('.opt4').value];
            questions.push(q);
        });
        const qData = { title, questions, shuffle: document.getElementById('shuffleOpt').checked, lock: document.getElementById('lockOpt').checked };
        if(id) db.ref('models/'+id).update(qData).then(() => Swal.fire('تم التحديث', '', 'success'));
        else db.ref('models').push(qData).then(() => { Swal.fire('تم الحفظ', '', 'success'); newQuiz(); });
    }

    // --- عرض الطلاب والنتائج (الاحترافي الجديد) ---
    function fetchModels() {
        db.ref('models').on('value', (snap) => {
            const list = document.getElementById('modelsList');
            list.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                list.innerHTML += `<div class="card" style="border-right:5px solid #1e293b; padding:15px; margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${m.title}</b>
                        <div>
                            <button onclick="loadToEdit('${child.key}')" class="btn btn-action" style="background:var(--accent)">📝 تعديل</button>
                            <button onclick="viewResults('${child.key}')" class="btn btn-action" style="background:var(--success)">📊 عرض الدرجات</button>
                            <button onclick="deleteModel('${child.key}')" class="btn btn-action" style="background:var(--error)">🗑️</button>
                        </div>
                    </div>
                    <div id="res_box_${child.key}" class="hidden res-container"></div>
                </div>`;
            });
        });
    }

    function viewResults(mId) {
        const resDiv = document.getElementById('res_box_'+mId);
        resDiv.classList.toggle('hidden');
        if(!resDiv.classList.contains('hidden')) {
            resDiv.innerHTML = '<p style="text-align:center">جاري استخراج كشف الدرجات...</p>';
            db.ref('results/'+mId).once('value', (snap) => {
                if(!snap.exists()) { resDiv.innerHTML = '<p style="color:var(--error); text-align:center">لا يوجد بيانات للطلاب حالياً.</p>'; return; }
                
                let tableHtml = `<table class="results-table">
                    <thead>
                        <tr>
                            <th>👤 اسم الطالب</th>
                            <th>🏢 الفصل</th>
                            <th>🎯 الدرجة النهائية</th>
                            <th>⏰ التوقيت</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                snap.forEach(c => {
                    const r = c.val();
                    const timeStr = new Date(r.time).toLocaleTimeString('ar-SA', {hour: '2-digit', minute:'2-digit'});
                    const dateStr = new Date(r.time).toLocaleDateString('ar-SA');
                    
                    tableHtml += `<tr>
                        <td class="name-cell">${r.name}</td>
                        <td>${r.class}</td>
                        <td><span class="score-badge">${r.score}</span></td>
                        <td>
                            <span style="font-weight:bold">${timeStr}</span>
                            <span class="time-label">${dateStr}</span>
                        </td>
                    </tr>`;
                });
                
                resDiv.innerHTML = tableHtml + `</tbody></table>`;
            });
        }
    }

    // منطق الطالب (محفوظ)
    let currentQuiz = null;
    function loadStudentQuiz(id) {
        db.ref('models/'+id).once('value', (snap) => {
            if(snap.exists()) { currentQuiz = snap.val(); document.getElementById('stQuizTitle').innerText = currentQuiz.title; }
        });
    }

    function startStudentQuiz() {
        const name = document.getElementById('stName').value;
        const cls = document.getElementById('stClass').value;
        if(!name || !cls) return Swal.fire('تنبيه', 'أدخل بياناتك', 'warning');
        showStudentQuestions();
    }

    function showStudentQuestions() {
        document.getElementById('studentLogin').classList.add('hidden');
        document.getElementById('stQuizArea').classList.remove('hidden');
        const area = document.getElementById('stQuestions');
        area.innerHTML = '';
        let qs = [...currentQuiz.questions];
        if(currentQuiz.shuffle) qs = qs.sort(() => Math.random() - 0.5);
        qs.forEach((q, i) => {
            let h = `<div class="card student-q-card" data-idx="${currentQuiz.questions.indexOf(q)}"><h4>${q.text} <small>(${q.points} درجة)</small></h4>`;
            if(q.type==='extract') h = `<div class="card student-q-card" data-idx="${currentQuiz.questions.indexOf(q)}"><p style="background:#eee;padding:15px;border-radius:10px;">${q.text}</p><h4>${q.sub} <small>(${q.points} درجة)</small></h4>`;
            if(q.type==='choice') {
                q.opts.forEach(o => { if(o) h += `<label style="display:block; margin:10px 0;"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`; });
            } else { h += `<input type="text" class="ans-input" placeholder="اكتب إجابتك هنا...">`; }
            area.innerHTML += h + `</div>`;
        });
    }

    function submitStudentAnswers() {
        let totalScore = 0; let maxScore = 0;
        const cards = document.querySelectorAll('.student-q-card');
        cards.forEach((card) => {
            const qIdx = card.getAttribute('data-idx');
            const q = currentQuiz.questions[qIdx];
            const radio = card.querySelector('input:checked');
            const text = card.querySelector('.ans-input');
            const studentAns = (radio ? radio.value : (text ? text.value : "")).trim();
            maxScore += q.points;
            if(studentAns === q.correct) totalScore += q.points;
        });

        const scoreStr = `${totalScore} من ${maxScore}`;
        const result = { name: document.getElementById('stName').value, class: document.getElementById('stClass').value, score: scoreStr, time: Date.now() };
        
        db.ref('results/'+quizId).push(result).then(() => {
            Swal.fire('تم الإرسال', 'تم استلام إجاباتك بنجاح', 'success').then(() => location.reload());
        });
    }

    function generateLink() {
        const id = document.getElementById('currentModelId').value;
        if(!id) return Swal.fire('تنبيه', 'احفظ أولاً', 'error');
        const link = window.location.origin + window.location.pathname + '?id=' + id;
        Swal.fire({ title: 'رابط الطلاب', html: `<input id="copyL" value="${link}" style="width:100%; text-align:center; padding:10px;" readonly>`, confirmButtonText: 'نسخ الرابط' }).then(() => { const input = document.getElementById('copyL'); input.select(); document.execCommand('copy'); });
    }

    function newQuiz() { document.getElementById('currentModelId').value=''; document.getElementById('quizTitle').value=''; document.getElementById('questionsArea').innerHTML=''; qCount=0; }
    function loadToEdit(id) { db.ref('models/'+id).once('value', snap => { const m = snap.val(); newQuiz(); document.getElementById('currentModelId').value=id; document.getElementById('quizTitle').value=m.title; m.questions.forEach(q => addQuestion(q)); }); }
    function deleteModel(id) { if(confirm('حذف نهائياً؟')) db.ref('models/'+id).remove(); }
</script>
</body>
</html>
