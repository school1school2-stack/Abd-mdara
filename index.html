<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الفيفي للإدارة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #7f1d1d; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .admin-header { background: var(--dark); color: white; padding: 25px; text-align: center; border-bottom: 6px solid var(--primary); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        
        /* بطاقات النماذج */
        .model-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; border-right: 12px solid var(--primary); box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .model-card:hover { transform: translateY(-5px); }
        
        .setup-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-save { background: var(--primary); color: white; width: 100%; font-size: 1.1rem; }
        .btn-results { background: #0284c7; color: white; margin-top: 10px; }
        
        /* جدول النتائج */
        .results-table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fafafa; border-radius: 10px; overflow: hidden; }
        .results-table th { background: #e2e8f0; padding: 12px; font-size: 0.9rem; }
        .results-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.85rem; }
        
        /* تمييز الحالة */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; cursor: pointer; }
        .status-correct { background: #dcfce7; color: #166534; }
        .status-wrong { background: #fee2e2; color: #991b1b; }
        
        .color-dot { width: 25px; height: 25px; border-radius: 50%; display: inline-block; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body>

<div class="admin-header">
    <h1>مركز التحكم الذكي بالنماذج ⚖️</h1>
    <p>أ. عبدالعزيز الفيفي - الإدارة النحوية والنتائج المفرزة</p>
</div>

<div class="container">
    <div class="model-card" style="border-right-color: #0f172a;">
        <h3 style="margin-top:0">🆕 إنشاء نموذج جديد</h3>
        <input type="text" id="newTitle" placeholder="عنوان النموذج الجديد..." style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;">
        
        <div class="setup-row">
            <button class="btn" style="background:#eee" onclick="addQuestion()">➕ إضافة سؤال</button>
            <div style="display:flex; align-items:center; gap:5px; background:#eee; padding:5px 15px; border-radius:12px">
                <span>اللون:</span>
                <span class="color-dot" style="background:#7f1d1d" onclick="setTempColor('#7f1d1d')"></span>
                <span class="color-dot" style="background:#1e3a8a" onclick="setTempColor('#1e3a8a')"></span>
                <span class="color-dot" style="background:#065f46" onclick="setTempColor('#065f46')"></span>
            </div>
        </div>
        
        <div id="tempQuestions"></div>
        <button class="btn btn-save" onclick="saveModelToCloud()">حفظ النموذج ونشر الرابط 🚀</button>
    </div>

    <hr style="opacity: 0.2; margin: 40px 0;">

    <h3 style="color:var(--dark)">🗂️ النماذج الحالية ونتائج الطلاب:</h3>
    <div id="modelsList"></div>
</div>

<script>
    // --- إعدادات Firebase ---
    const firebaseConfig = { databaseURL: "https://youy-apps-default-rtdb.firebaseio.com" }; // ضع بياناتك الحقيقية هنا
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let tempColor = "#7f1d1d";

    // 1. الخوارزمية النحوية الذكية (تجاهل الأخطاء الإملائية الشائعة)
    function smartGrammarCheck(userInput, correctAns) {
        if(!userInput) return false;
        const clean = (str) => {
            return str.trim()
                .replace(/[أإآ]/g, 'ا')
                .replace(/ة/g, 'ه')
                .replace(/ى/g, 'ي')
                .replace(/\s+/g, '');
        };
        return clean(userInput) === clean(correctAns);
    }

    // 2. جلب النماذج والنتائج بشكل منفصل
    db.ref('models').on('value', (snapshot) => {
        const list = document.getElementById('modelsList');
        list.innerHTML = '';
        snapshot.forEach(child => {
            const m = child.val();
            const mId = child.key;
            
            let modelHtml = `
                <div class="model-card" style="border-right-color: ${m.color}">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <h4>${m.title} <small style="color:#666; font-weight:normal;">(أسئلة: ${m.qCount || 0})</small></h4>
                        <button class="btn btn-results" onclick="toggleResults('${mId}')">📊 عرض إجابات الطلاب لهذا النموذج</button>
                    </div>
                    <div id="results_${mId}" style="display:none; margin-top:20px; border-top:2px solid #eee;">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>الطالب</th>
                                    <th>الفصل</th>
                                    <th>الدرجة</th>
                                    <th>التصحيح اليدوي</th>
                                </tr>
                            </thead>
                            <tbody id="tbody_${mId}"></tbody>
                        </table>
                    </div>
                </div>`;
            list.innerHTML += modelHtml;
            loadResultsForModel(mId);
        });
    });

    // 3. تحميل نتائج كل نموذج على حدة (عدم الخلط)
    function loadResultsForModel(mId) {
        db.ref(`results/${mId}`).on('value', (snap) => {
            const tbody = document.getElementById(`tbody_${mId}`);
            if(!tbody) return;
            tbody.innerHTML = '';
            snap.forEach(resSnap => {
                const r = resSnap.val();
                const rId = resSnap.key;
                tbody.innerHTML += `
                    <tr>
                        <td><b>${r.name}</b></td>
                        <td>${r.class}</td>
                        <td id="score_${rId}">${r.score}</td>
                        <td>
                            <button class="btn" style="background:#eee; font-size:0.7rem" onclick="inspectStudent('${mId}', '${rId}')">👁️ مراجعة وتعديل</button>
                        </td>
                    </tr>`;
            });
        });
    }

    // 4. مراجعة إجابات الطالب وتعديلها يدوياً
    function inspectStudent(mId, rId) {
        db.ref(`results/${mId}/${rId}`).once('value', (snap) => {
            const data = snap.val();
            let details = '<div style="text-align:right; direction:rtl;">';
            data.answers.forEach((ans, index) => {
                const isCorrect = ans.isCorrect ? '✅' : '❌';
                details += `
                    <div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:5px">
                        <b>س${index+1}: ${ans.question}</b><br>
                        إجابة الطالب: <span style="color:blue">${ans.userAns}</span> <br>
                        الصحيحة: <span style="color:green">${ans.correctAns}</span> ${isCorrect}
                        <button onclick="manualOverride('${mId}', '${rId}', ${index})" style="padding:2px 8px; font-size:0.7rem; cursor:pointer">تغيير الحالة</button>
                    </div>`;
            });
            details += '</div>';

            Swal.fire({
                title: `مراجعة: ${data.name}`,
                html: details,
                width: '600px',
                confirmButtonText: 'إغلاق'
            });
        });
    }

    // 5. التعديل اليدوي واحتساب الإجابة
    function manualOverride(mId, rId, qIndex) {
        const ref = db.ref(`results/${mId}/${rId}/answers/${qIndex}`);
        ref.once('value', (snap) => {
            const newState = !snap.val().isCorrect;
            ref.update({ isCorrect: newState }).then(() => {
                // إعادة حساب الدرجة الكلية للطالب
                db.ref(`results/${mId}/${rId}/answers`).once('value', (allAnsSnap) => {
                    let newScore = 0;
                    allAnsSnap.forEach(a => { if(a.val().isCorrect) newScore++; });
                    db.ref(`results/${mId}/${rId}`).update({ score: newScore + " / " + allAnsSnap.numChildren() });
                    Swal.fire('تم التعديل', 'تحدثت درجة الطالب فوراً في الجدول', 'success');
                });
            });
        });
    }

    function toggleResults(id) {
        const el = document.getElementById(`results_${id}`);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    function setTempColor(c) { tempColor = c; }
</script>
</body>
</html>
