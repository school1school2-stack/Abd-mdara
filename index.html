<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الفيفي للاختبارات | الإصدار الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; --bg: #f1f5f9; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .header { background: linear-gradient(135deg, #0f172a, #1e3a8a); color: white; padding: 40px; text-align: center; border-bottom: 6px solid var(--accent); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        
        /* تصميم الكروت والأقسام */
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 25px; display: none; border: 1px solid #e2e8f0; }
        .active { display: block; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { background: var(--primary); color: white; padding: 10px 20px; border-radius: 10px; display: inline-block; margin-bottom: 20px; }
        .q-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .q-item { background: #f8fafc; padding: 20px; border-radius: 15px; border-right: 6px solid var(--accent); position: relative; }
        
        /* لوحة التحكم */
        .admin-btn { position: fixed; bottom: 20px; left: 20px; background: #64748b; color: white; border: none; padding: 10px; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; opacity: 0.5; }
        .admin-panel { background: #fff; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-top: 20px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        
        input[type="text"], select { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #cbd5e1; border-radius: 10px; font-family: 'Cairo'; }
        .btn { padding: 12px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-next { background: var(--accent); color: white; float: left; }
    </style>
</head>
<body>

<div class="header">
    <h1>منصة الفيفي الرقمية للاختبارات</h1>
    <p id="subTitle">نظام الاختبارات المؤتمتة - الإصدار السحابي</p>
</div>

<div class="container">
    <div id="step0" class="card active">
        <h3 style="text-align:center">تسجيل دخول الطالب</h3>
        <input type="text" id="stdName" placeholder="الاسم الرباعي">
        <input type="text" id="stdClass" placeholder="الصف / الفصل">
        <select id="modelChoice">
            <option value="random">توزيع تلقائي للنماذج</option>
            <option value="1">النموذج 1</option>
            <option value="2">النموذج 2</option>
        </select>
        <button class="btn btn-main" onclick="startEngine()">بدأ الاختبار</button>
    </div>

    <div id="examContainer"></div>

    <button class="admin-btn" onclick="openAdmin()">⚙️</button>
    <div id="adminPanel" class="container" style="display:none">
        <div class="card active">
            <h2>لوحة تحكم المعلم 🔒</h2>
            <div id="resultsView">
                <h3>نتائج الطلاب المباشرة</h3>
                <div style="overflow-x:auto"><table id="resultsTable"><thead><tr><th>الطالب</th><th>الفصل</th><th>النموذج</th><th>الدرجة</th><th>التوقيت</th></tr></thead><tbody></tbody></table></div>
            </div>
            <hr>
            <button class="btn" onclick="location.reload()">خروج</button>
        </div>
    </div>
</div>

<script>
    // --- بيانات Firebase (ضع بياناتك هنا ليعمل الحفظ) ---
    const firebaseConfig = {
        apiKey: "AIzaSyAvRIim7axjg0hGrMk0qVrXT...", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.appspot.com",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // هيكلة الأقسام الستة (نموذج محاكي)
    const sectionsNames = ["التمثيل والنحو", "الصح والخطأ", "الاختيارات المتعددة", "إكمال الفراغات", "الإعراب والتحليل", "الاستخراج من النص"];
    
    let currentStep = 0;
    let score = 0;

    function startEngine() {
        const name = document.getElementById('stdName').value;
        if(!name) return Swal.fire('تنبيه','ادخل اسمك','warning');
        
        document.getElementById('step0').classList.remove('active');
        buildExamSteps();
        document.getElementById('sectionStep1').classList.add('active');
    }

    function buildExamSteps() {
        const container = document.getElementById('examContainer');
        for(let i=1; i<=6; i++) {
            let sectionHtml = `
                <div id="sectionStep${i}" class="card">
                    <div class="section-title">القسم ${i}: ${sectionsNames[i-1]}</div>
                    <div class="q-grid">
                        ${generateQuestionsForSection(i)}
                    </div>
                    <div style="margin-top:20px; overflow:hidden">
                        <button class="btn btn-next" onclick="nextStep(${i})">${i===6 ? 'إرسال النتيجة للسحابة' : 'القسم التالي'}</button>
                    </div>
                </div>`;
            container.innerHTML += sectionHtml;
        }
    }

    function generateQuestionsForSection(sIdx) {
        let qs = '';
        for(let q=1; q<=7; q++) {
            qs += `
                <div class="q-item">
                    <b>س${q}: سؤال افتراضي في ${sectionsNames[sIdx-1]}؟</b>
                    <input type="text" class="q-input-s${sIdx}" placeholder="إجابتك...">
                </div>`;
        }
        return qs;
    }

    function nextStep(current) {
        if(current < 6) {
            document.getElementById(`sectionStep${current}`).classList.remove('active');
            document.getElementById(`sectionStep${current+1}`).classList.add('active');
            window.scrollTo(0,0);
        } else {
            finishAndSave();
        }
    }

    function finishAndSave() {
        // حساب الدرجة (هنا نضع منطق التصحيح)
        let finalScore = Math.floor(Math.random() * 20) + 22; // مثال

        const data = {
            name: document.getElementById('stdName').value,
            class: document.getElementById('stdClass').value,
            model: "نموذج سحابي 1",
            score: finalScore + " / 42",
            time: new Date().toLocaleString('ar-SA')
        };

        db.ref('results').push(data).then(() => {
            Swal.fire('تم الحفظ','تم إرسال إجاباتك كاملة للأقسام الستة إلى قاعدة بيانات المعلم','success').then(()=>location.reload());
        });
    }

    function openAdmin() {
        const p = prompt("كلمة مرور المعلم:");
        if(p === "admin123") {
            document.getElementById('examContainer').style.display = 'none';
            document.getElementById('step0').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            fetchResults();
        }
    }

    function fetchResults() {
        db.ref('results').on('value', (snap) => {
            let rows = '';
            snap.forEach(c => {
                const r = c.val();
                rows += `<tr><td>${r.name}</td><td>${r.class}</td><td>${r.model}</td><td>${r.score}</td><td>${r.time}</td></tr>`;
            });
            document.querySelector('#resultsTable tbody').innerHTML = rows;
        });
    }
</script>
</body>
</html>
