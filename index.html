<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - النسخة المعتمدة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --royal-blue: #1e3a8a; --q-red: #ef4444; --bg-page: #f8fafc; --success-green: #10b981; --k-purple: #7c3aed; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, Arial; 
            background: var(--bg-page); margin: 0; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; line-height: 1.6;
        }

        .user-header {
            width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; 
            margin-bottom: 30px; box-sizing: border-box;
        }
        .user-name { margin: 0; color: var(--royal-blue); font-weight: bold; font-size: 1.5rem; }
        .school-name { margin: 0; color: #64748b; font-weight: bold; font-size: 1rem; }
        .logo-box { background: var(--royal-blue); width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }

        .section-tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 850px; }
        .tab-btn { flex: 1; padding: 12px; background: white; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; font-weight: bold; color: #64748b; transition: 0.3s; }
        .tab-btn.active { border-color: var(--royal-blue); color: var(--royal-blue); background: #eff6ff; }

        .container { width: 100%; max-width: 850px; padding-bottom: 120px; }
        .question-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; transition: 0.3s; }
        .question-card::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }
        .kifayat-style::before { background: var(--k-purple) !important; }

        .smart-paste-area { margin-bottom: 20px; background: #f0fdf4; padding: 15px; border-radius: 12px; border: 2px dashed var(--success-green); }
        .smart-input { width: 100%; border: 1px solid #bbf7d0; padding: 12px; border-radius: 8px; font-family: inherit; font-size: 1rem; outline: none; }

        .card-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .q-number-badge { background: var(--royal-blue); color: white; padding: 2px 15px; border-radius: 50px; font-weight: bold; font-size: 0.9rem; }
        .type-select { background: #f1f5f9; border: none; padding: 8px; border-radius: 10px; font-weight: bold; font-family: inherit; cursor: pointer; }

        .estieab-box { background: #fff9c4 !important; border: 2px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 15px; color: #000; font-weight: bold; line-height: 1.8; width: 100%; box-sizing: border-box; text-align: right; min-height: 100px; height: auto; white-space: pre-wrap; font-size: 1.1rem; }
        .q-text-input { width: 100%; padding: 12px 15px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--q-red) !important; font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; outline: none; text-align: right; box-sizing: border-box; min-height: 50px; height: auto; word-wrap: break-word; font-family: inherit; }

        .essay-input { width: 100%; min-height: 60px; padding: 12px; border: 2px inset #e2e8f0; border-radius: 12px; background: #f8fafc; font-weight: bold; color: #1e293b; margin-top: 10px; outline: none; text-align: right; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 12px; box-sizing: border-box; cursor: pointer; transition: 0.2s; }
        .opt-label { font-weight: bold; color: var(--royal-blue); margin-left: 5px; white-space: pre; font-size: 1.05rem; }
        .opt-word { width: 100%; border: none; outline: none; font-weight: bold; color: #000; background: transparent; text-align: right; font-family: inherit; cursor: inherit; font-size: 1.1rem; }

        .pair-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; background: #fff1f2; padding: 15px; border-radius: 12px; border: 1.5px dashed #fca5a5; width: 100%; box-sizing: border-box; }
        .pair-word { width: 45%; text-align: center; border: none; background: white; padding: 10px; border-radius: 8px; color: var(--q-red) !important; font-weight: bold; font-size: 1.3rem; font-family: inherit; }

        .correct-ans-box { margin-top: 15px; padding: 10px; background: #f0fdf4; border-radius: 10px; border: 1px solid #bbf7d0; text-align: right; }
        .correct-input { width: 100%; background: transparent; border: none; outline: none; color: #166534; font-weight: bold; text-align: right; font-family: inherit; }

        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: nowrap; gap: 8px; z-index: 1000; background: #1e293b; padding: 10px 15px; border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); align-items: center; width: max-content; }
        .btn { border: none; padding: 10px 18px; border-radius: 30px; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-family: inherit; font-size: 0.9rem; white-space: nowrap; }
        .btn-add { background: #3b82f6; } .btn-save { background: #a855f7; } .btn-load { background: #4f46e5; }
        .btn-link { background: #06b6d4; } .btn-del { background: #f97316; } .btn-pdf { background: #ef4444; }
        .btn-img { background: #10b981; } .btn-clear { background: #64748b; padding: 10px; border-radius: 50%; }

        body.student-mode .controls, body.student-mode .remove-btn, body.student-mode .type-select, body.student-mode .correct-ans-box, body.student-mode .smart-paste-area, body.student-mode .admin-only { display: none !important; }
        body.student-mode .selected-opt { background: #dbeafe !important; border: 2px solid #3b82f6 !important; }

        #report-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 850px; height: 85%; background: white; z-index: 2000; border-radius: 20px; padding: 30px; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.4); }
        .report-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .report-table th, .report-table td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        .score-edit { width: 45px; text-align: center; border: 1px solid #ccc; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1999;" onclick="closeReport()"></div>
    <div id="report-modal">
        <h2 style="text-align: center; color: var(--royal-blue);">تقرير أداء الطالب 🎯</h2>
        <div id="score-summary" style="text-align: center; font-size: 1.4rem; font-weight: bold; margin: 20px 0;"></div>
        <table class="report-table">
            <thead>
                <tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الصحيحة</th><th>الدرجة</th></tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <button class="btn" style="background:#64748b; width:100%; margin-top:20px;" onclick="closeReport()">إغلاق التقرير</button>
    </div>

    <div class="user-header" id="main-header">
        <div class="header-right"><h2 class="user-name">أ. عبدالعزيز الفيفي</h2></div>
        <div class="header-center"><div class="logo-box"><i class="fas fa-award"></i></div></div>
        <div class="header-left"><p class="school-name">ثانوية الأمير عبدالمجيد 😉</p></div>
    </div>

    <div class="section-tabs admin-only">
        <button class="tab-btn active" onclick="setSection('qudrat')">قسم القدرات اللفظي</button>
        <button class="tab-btn" onclick="setSection('kifayat')">قسم الكفايات اللغوية</button>
    </div>

    <div class="container" id="quiz-content"></div>

    <div id="student-actions" style="display: none; text-align: center; margin-bottom: 50px;">
        <button id="main-grade-btn" class="btn" style="background:#10b981; padding:15px 30px" onclick="gradeExam()"><i class="fas fa-graduation-cap"></i> انتهيت.. أرني النتيجة</button>
    </div>

    <div class="controls" id="admin-controls">
        <button class="btn btn-clear" title="مسح الكل" onclick="clearAll()"><i class="fas fa-eraser"></i></button>
        <button class="btn btn-img" onclick="saveAsImages()"><i class="fas fa-image"></i> صور</button>
        <button class="btn btn-pdf" onclick="saveAsPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="btn btn-del" onclick="deleteFromCloud()"><i class="fas fa-trash-alt"></i> حذف</button>
        <button class="btn btn-link" onclick="generateStudentLink()"><i class="fas fa-link"></i> رابط الطلاب</button>
        <button class="btn btn-load" onclick="loadFromCloud()"><i class="fas fa-cloud-download-alt"></i> فتح</button>
        <button class="btn btn-save" onclick="saveToCloud()"><i class="fas fa-cloud-upload-alt"></i> حفظ</button>
        <button class="btn btn-add" onclick="addQuestion()"><i class="fas fa-plus"></i> سؤال</button>
    </div>

    <script>
        let currentSection = 'qudrat';
        const typeMap = { 
            'qudrat': {
                'tanazor': 'تناظر لفظي ( : )', 
                'ekmal': 'إكمال جمل', 
                'khata': 'خطأ سياقي',
                'estieab': 'استيعاب المقروء', 
                'shaza': 'المفردة الشاذة', 
                'irtibat': 'الارتباط والاختلاف'
            },
            'kifayat': {
                'k_fill': 'أكمل الفراغ',
                'k_irab': 'أعرب ما تحته خط',
                'k_sentence': 'مثل في جملة مفيدة',
                'k_extract': 'استخرج من النص',
                'k_true': 'صح وخطأ',
                'k_multi': 'اختر الإجابة الصحيحة'
            }
        };
        const labels = ['أ) ', 'ب) ', 'ج) ', 'د) '];

        const firebaseConfig = {
            apiKey: "AIzaSyAVrIim7aXjg0hGrMk0qVrXT8geRIpHoBk",
            authDomain: "youy-apps.firebaseapp.com",
            databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
            projectId: "youy-apps"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function setSection(sec) {
            currentSection = sec;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.includes(sec==='qudrat'?'القدرات':'الكفايات')));
            document.getElementById('quiz-content').innerHTML = '';
            loadQuestions();
        }

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            const type = data ? data.type : (currentSection === 'qudrat' ? 'tanazor' : 'k_fill');
            card.className = `question-card ${currentSection==='kifayat'?'kifayat-style':''}`;
            card.dataset.section = currentSection;

            // تحديد ما إذا كان السؤال يحتاج مفتاح إجابة (القدرات كلها + صح/خطأ واختياري في الكفايات)
            const needsKey = (currentSection === 'qudrat') || (['k_true','k_multi'].includes(type));

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px">
                    <div class="card-meta">
                        <span class="q-number-badge"></span>
                        <select class="type-select" onchange="toggleType(this)">
                            ${Object.entries(typeMap[currentSection]).map(([k,v])=>`<option value="${k}" ${type===k?'selected':''}>${v}</option>`).join('')}
                        </select>
                    </div>
                    <i class="fas fa-times-circle remove-btn" style="color:#cbd5e1; cursor:pointer;" onclick="this.closest('.question-card').remove();updateNumbers();saveAll();"></i>
                </div>
                <div class="smart-paste-area admin-only">
                    <textarea class="smart-input" placeholder="اللصق الذكي هنا..." oninput="autoDistribute(this)"></textarea>
                </div>
                <div class="q-area">${renderQArea(type, data)}</div>
                <div class="ans-grid-area">${renderOptions(type, data)}</div>
                <div class="correct-ans-box admin-only" style="${needsKey ? '' : 'display:none'}">
                    <input type="text" placeholder="حرف الإجابة فقط" class="correct-input ans-val" value="${data?data.ans||'':''}" oninput="saveAll()">
                </div>
            `;
            container.appendChild(card);
            
            card.querySelectorAll('.opt-pair-row').forEach(row => {
                row.onclick = () => { if (document.body.classList.contains('student-mode')) { 
                    card.querySelectorAll('.opt-pair-row').forEach(r => r.classList.remove('selected-opt')); 
                    row.classList.add('selected-opt');
                }};
            });

            updateNumbers();
            if(!document.body.classList.contains('student-mode')) saveAll();
        }

        function renderQArea(t, d) {
            if (t === 'tanazor') return `<div class="pair-row"><input type="text" class="pair-word t1" placeholder="كلمة 1" value="${d?d.text1:''}" oninput="saveAll()"><span style="color:red; font-weight:bold; font-size:1.5rem"> : </span><input type="text" class="pair-word t2" placeholder="كلمة 2" value="${d?d.text2:''}" oninput="saveAll()"></div>`;
            if (t === 'estieab' || t === 'k_extract') return `<div class="estieab-box" contenteditable="true" oninput="saveAll()" placeholder="النص...">${d?d.text_area||'' : ''}</div><textarea class="q-text-input q-main" placeholder="السؤال..." oninput="saveAll()">${d?d.text:''}</textarea>`;
            return `<textarea class="q-text-input q-main" placeholder="اكتب السؤال هنا..." oninput="saveAll()">${d?d.text:''}</textarea>`;
        }

        function renderOptions(t, d) {
            if (['k_fill', 'k_irab', 'k_sentence', 'k_extract'].includes(t)) {
                return `<div class="essay-input" contenteditable="true" placeholder="إجابة الطالب هنا..."></div>`;
            }
            let h = '<div class="options-grid">';
            let count = (t === 'k_true') ? 2 : 4;
            for(let i=0; i<count; i++) {
                if(t==='tanazor') h+=`<div class="opt-pair-row"><span class="opt-label">${labels[i]}</span><input type="text" class="opt-word op1" placeholder="1" value="${d?.opt_pair_val1?.[i] || ''}" oninput="saveAll()"><span style="color:red; font-weight:bold"> : </span><input type="text" class="opt-word op2" placeholder="2" value="${d?.opt_pair_val2?.[i] || ''}" oninput="saveAll()"></div>`;
                else h+=`<div class="opt-pair-row"><span class="opt-label">${labels[i]}</span><input type="text" class="opt-word opt" placeholder="خيار ${labels[i]}" value="${d?.opts?.[i]||(t==='k_true'?(i===0?'صح':'خطأ'):'')}" oninput="saveAll()"></div>`;
            }
            return h + '</div>';
        }

        function gradeExam() {
            const cards = document.querySelectorAll('.question-card');
            let s = 0; const report = document.getElementById('report-body'); report.innerHTML = "";
            
            cards.forEach((c, i) => {
                const type = c.querySelector('.type-select').value;
                const qTxt = c.querySelector('.q-main')?.value || (c.querySelector('.t1')?.value + ":" + c.querySelector('.t2')?.value) || "سؤال";
                let studentAns = "", correctKey = "", isCor = false, pts = 0;

                if (['k_fill','k_irab','k_sentence','k_extract'].includes(type)) {
                    studentAns = c.querySelector('.essay-input').innerText;
                    pts = studentAns.length > 1 ? 1 : 0;
                    correctKey = "تصحيح المعلم";
                } else {
                    const selLabel = c.querySelector('.selected-opt .opt-label')?.innerText.replace(')','').trim() || "";
                    const key = c.querySelector('.ans-val').value.trim().toUpperCase();
                    studentAns = selLabel;
                    correctKey = key;
                    isCor = (selLabel === key);
                    pts = isCor ? 1 : 0;
                }
                s += pts;
                report.innerHTML += `<tr><td>${i+1}</td><td style="text-align:right">${qTxt}</td><td>${studentAns || '--'}</td><td style="color:var(--success-green); font-weight:bold">${correctKey}</td><td><input type="number" class="score-edit" value="${pts}" onchange="recalc()"></td></tr>`;
            });
            document.getElementById('score-summary').innerText = `النتيجة الإجمالية: ${s} من ${cards.length}`;
            document.getElementById('report-modal').style.display = 'block'; document.getElementById('modal-overlay').style.display = 'block';
        }

        function recalc() {
            let total = 0; document.querySelectorAll('.score-edit').forEach(input => total += parseFloat(input.value || 0));
            document.getElementById('score-summary').innerText = `النتيجة المعدلة: ${total} من ${document.querySelectorAll('.question-card').length}`;
        }

        function toggleType(s) { 
            const c = s.closest('.question-card'); 
            const val = s.value; 
            const sec = c.dataset.section;
            c.querySelector('.q-area').innerHTML = renderQArea(val,null); 
            c.querySelector('.ans-grid-area').innerHTML = renderOptions(val,null); 
            c.querySelector('.correct-ans-box').style.display = (sec === 'qudrat' || ['k_true','k_multi'].includes(val)) ? '' : 'none';
            saveAll(); 
        }

        function updateNumbers() { document.querySelectorAll('.q-number-badge').forEach((b, i) => b.innerText = `السؤال ${i+1}`); }
        function closeReport() { document.getElementById('report-modal').style.display = 'none'; document.getElementById('modal-overlay').style.display = 'none'; }
        
        function saveAll() {
            const qs = []; document.querySelectorAll('.question-card').forEach(c => {
                const t = c.querySelector('.type-select').value;
                const sec = c.dataset.section;
                let d = { type: t, section: sec, ans: c.querySelector('.ans-val')?.value || '' };
                if (t === 'tanazor') { d.text1 = c.querySelector('.t1').value; d.text2 = c.querySelector('.t2').value; d.opt_pair_val1 = Array.from(c.querySelectorAll('.op1')).map(i => i.value); d.opt_pair_val2 = Array.from(c.querySelectorAll('.op2')).map(i => i.value); }
                else { d.text = c.querySelector('.q-main')?.value || ""; if(t==='estieab' || t==='k_extract') d.text_area = c.querySelector('.estieab-box').innerText; d.opts = Array.from(c.querySelectorAll('.opt')).map(i => i.value); }
                qs.push(d);
            });
            localStorage.setItem('fifi_total_v3', JSON.stringify(qs));
        }

        function loadQuestions() {
            const examId = new URLSearchParams(window.location.search).get('exam');
            if (examId) { document.body.classList.add('student-mode'); document.getElementById('student-actions').style.display = 'block'; loadSpecificExam(examId); }
            else { 
                const s = localStorage.getItem('fifi_total_v3'); 
                if(s) { JSON.parse(s).filter(q => q.section === currentSection).forEach(q => addQuestion(q)); } 
            }
        }

        function clearAll() { if(confirm("مسح الكل؟")) { localStorage.clear(); document.getElementById('quiz-content').innerHTML = ""; } }
        async function saveToCloud() { const n = prompt("اسم النموذج:"); if(n) { await db.ref('models/' + n).set({ teacher: "أ. عبدالعزيز الفيفي", data: JSON.parse(localStorage.getItem('fifi_total_v3')), date: new Date().toLocaleString() }); alert("تم الحفظ بنجاح!"); } }
        function loadFromCloud() { db.ref('models').once('value', s => { const ms = s.val(); if(ms) { const c = prompt("اختر النموذج:\n" + Object.keys(ms).join("\n")); if(c && ms[c]) { localStorage.setItem('fifi_total_v3', JSON.stringify(ms[c].data)); location.reload(); } } }); }
        function generateStudentLink() { const n = prompt("اسم النموذج:"); if(n) prompt("الرابط:", window.location.origin + window.location.pathname + "?exam=" + encodeURIComponent(n)); }
        function loadSpecificExam(id) { db.ref('models/' + id).once('value', s => { if (s.val()) { s.val().data.forEach(q => addQuestion(q)); } }); }
        async function saveAsImages() { alert("جاري المعالجة..."); }
        function saveAsPDF() { window.print(); }
    </script>
</body>
</html>
