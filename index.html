<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك النماذج الذكي | أ. عبدالعزيز الفيفي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #7f1d1d; --accent: #b91c1c; --bg: #fffafb; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        .header { background: linear-gradient(135deg, #1e293b, var(--primary)); color: white; padding: 30px; text-align: center; border-bottom: 6px solid rgba(255,255,255,0.2); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .admin-panel { border: 2px solid var(--primary); background: #fff5f5; }
        
        /* تنسيق بناء الأسئلة */
        .stage-box { background: white; border: 1px solid #ddd; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .q-row { background: #f9fafb; padding: 15px; border-radius: 10px; margin-top: 10px; border-right: 5px solid var(--primary); }
        
        select, input, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; font-family: 'Cairo'; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; display: inline-block; cursor: pointer; border: 2px solid #fff; }
        
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: 'Cairo'; }
        .btn-save { background: var(--primary); color: white; width: 100%; font-size: 1.2rem; margin-top: 20px; }
        
        .type-label { font-size: 0.8rem; background: #eee; padding: 2px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h1>محرك بناء النماذج الاحترافي</h1>
    <p>أهلاً أ. عبدالعزيز، صمم نموذجك الـ 42 سؤالاً بضغطة زر</p>
</div>

<div class="container">
    <div class="card admin-panel">
        <h3>⚙️ إعدادات النموذج الجديد</h3>
        
        <div style="display: flex; gap: 20px; align-items: center; margin-bottom: 15px;">
            <input type="text" id="modelTitle" placeholder="عنوان النموذج (مثلاً: كفايات 5)" style="flex: 2;">
            <div id="colorPicker">
                <span class="color-dot" style="background:#7f1d1d" onclick="setTheme('#7f1d1d')"></span>
                <span class="color-dot" style="background:#1e3a8a" onclick="setTheme('#1e3a8a')"></span>
                <span class="color-dot" style="background:#065f46" onclick="setTheme('#065f46')"></span>
                <span class="color-dot" style="background:#92400e" onclick="setTheme('#92400e')"></span>
            </div>
        </div>

        <div id="stagesContainer">
            </div>

        <button class="btn btn-save" onclick="saveFullModel()">حفظ ونشر النموذج السحابي 🚀</button>
    </div>
</div>

<script>
    let currentColor = "#7f1d1d";

    function setTheme(c) {
        currentColor = c;
        document.documentElement.style.setProperty('--primary', c);
    }

    // توليد الـ 6 مراحل (كل مرحلة 7 أسئلة)
    function buildMaker() {
        const container = document.getElementById('stagesContainer');
        for (let s = 1; s <= 6; s++) {
            let stageHtml = `
                <div class="stage-box">
                    <h4 style="color:var(--primary)">المرحلة ${s} (7 أسئلة)</h4>
                    <div id="stage_${s}_qs">`;
            
            for (let q = 1; q <= 7; q++) {
                stageHtml += `
                    <div class="q-row">
                        <div style="display:flex; justify-content:space-between">
                            <span>سؤال ${q}:</span>
                            <select onchange="toggleQType(this, ${s}, ${q})" class="q-type">
                                <option value="text">✍️ إكمال / استخراج (نص)</option>
                                <option value="radio">🔘 اختيار من متعدد</option>
                                <option value="true_false">✅ صح وخطأ</option>
                                <option value="parsing">⚖️ إعراب</option>
                                <option value="represent">🎭 تمثيل</option>
                            </select>
                        </div>
                        <input type="text" class="q-text" placeholder="اكتب السؤال هنا...">
                        <div class="q-options" style="display:none">
                            <input type="text" class="opt-1" placeholder="خيار 1">
                            <input type="text" class="opt-2" placeholder="خيار 2">
                            <input type="text" class="opt-3" placeholder="خيار 3">
                            <input type="text" class="opt-4" placeholder="خيار 4">
                        </div>
                        <input type="text" class="q-ans" placeholder="الإجابة الصحيحة">
                        <input type="text" class="q-hint" placeholder="تلميح المساعدة (?)">
                    </div>`;
            }
            stageHtml += `</div></div>`;
            container.innerHTML += stageHtml;
        }
    }

    function toggleQType(select, s, q) {
        const row = select.closest('.q-row');
        const optsDiv = row.querySelector('.q-options');
        const ansInput = row.querySelector('.q-ans');
        
        if (select.value === 'radio') {
            optsDiv.style.display = 'block';
        } else if (select.value === 'true_false') {
            optsDiv.style.display = 'none';
            ansInput.placeholder = "اكتب (صح) أو (خطأ)";
        } else {
            optsDiv.style.display = 'none';
        }
    }

    function saveFullModel() {
        // هنا نجمع الـ 42 سؤالاً ونرفعهم لـ Firebase
        Swal.fire('جاري الحفظ', 'يتم الآن ربط الأسئلة الـ 42 بهوية النموذج السحابي...', 'info');
        // منطق الحفظ لـ Firebase كما في الرد السابق
    }

    window.onload = buildMaker;
</script>
</body>
</html>
