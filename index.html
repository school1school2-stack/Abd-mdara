<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #7f1d1d; --bg: #f8fafc; --dark: #1e293b; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; color: #334155; }
        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-right: 8px solid var(--primary); }
        .admin-header { background: var(--dark); color: white; padding: 30px; text-align: center; border-bottom: 6px solid var(--primary); }
        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin: 15px 0; }
        .setting-item { background: #f1f5f9; padding: 12px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1.5px solid #cbd5e1; border-radius: 12px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-top: 10px; }
        .btn-action { font-size: 0.75rem; padding: 5px 12px; margin: 2px; color: white; border-radius: 8px; }
        .q-box { background: #f8fafc; padding: 15px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 15px; position: relative; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: center; }
        th { background: #f1f5f9; }
        .res-detail { background: #fff8f8; padding: 10px; border-radius: 8px; font-size: 0.8rem; text-align: right; margin-top: 5px; border: 1px dashed var(--primary); }
    </style>
</head>
<body>

<div id="adminView" class="hidden">
    <div class="admin-header">
        <h1>لوحة تحكم المعلم (الإدارة والنتائج) ⚖️</h1>
        <p>أ. عبدالعزيز الفيفي - نظام الربط السحابي المباشر</p>
    </div>
    <div class="container">
        <div class="card">
            <h3>⚙️ إعدادات الاختبار</h3>
            <input type="hidden" id="currentModelId">
            <input type="text" id="quizTitle" placeholder="عنوان الاختبار (مثلاً: كفايات 4 - اختبار تشخيصي)">
            <div class="setup-grid">
                <div class="setting-item"><span>🔀 خلط عشوائي</span><input type="checkbox" id="shuffleOpt"></div>
                <div class="setting-item"><span>🔒 منع الإعادة</span><input type="checkbox" id="lockOpt" checked></div>
            </div>
        </div>

        <div id="questionsArea"></div>
        <button class="btn" style="background:var(--dark); color:white; width:100%; margin-bottom:20px;" onclick="addQuestion()">+ إضافة سؤال جديد</button>

        <div class="card" style="border-top: 5px solid #059669;">
            <div class="setup-grid">
                <button class="btn btn-main" onclick="saveToCloud()">💾 حفظ السحابة</button>
                <button class="btn btn-main" style="background:#0284c7" onclick="generateLink()">🔗 رابط الطلاب</button>
                <button class="btn btn-main" style="background:#64748b" onclick="newQuiz()">📄 نموذج جديد</button>
            </div>
        </div>

        <div class="card">
            <h3>📂 النماذج المحفوظة والنتائج الواردة</h3>
            <div id="modelsList">جاري جلب البيانات...</div>
        </div>
    </div>
</div>

<div id="studentView" class="hidden">
    <div class="container">
        <div class="card" id="studentLogin" style="text-align:center; margin-top:50px;">
            <h2 id="stQuizTitle">تحميل...</h2>
            <input type="text" id="stName" placeholder="الاسم الثلاثي">
            <input type="text" id="stClass" placeholder="الفصل">
            <button class="btn btn-main" onclick="startStudentQuiz()">دخول الاختبار</button>
        </div>
        <div id="stQuizArea" class="hidden">
            <div id="stQuestions"></div>
            <button class="btn btn-main" onclick="submitStudentAnswers()">إرسال الإجابات</button>
        </div>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let qCount = 0;
    const urlParams = new URLSearchParams(window.location.search);
    const quizId = urlParams.get('id');

    if (quizId) {
        document.getElementById('studentView').classList.remove('hidden');
        loadStudentQuiz(quizId);
    } else {
        document.getElementById('adminView').classList.remove('hidden');
        fetchModels();
    }

    function addQuestion(data = null) {
        qCount++;
        const qId = `q_${qCount}`;
        const html = `
            <div class="q-box" id="${qId}">
                <select class="q-type" onchange="renderQInputs(this, ${qCount})">
                    <option value="text" ${data?.type=='text'?'selected':''}>سؤال وجواب</option>
                    <option value="true_false" ${data?.type=='true_false'?'selected':''}>صح وخطأ</option>
                    <option value="choice" ${data?.type=='choice'?'selected':''}>اختر (4 خيارات)</option>
                    <option value="parsing" ${data?.type=='parsing'?'selected':''}>إعراب</option>
                    <option value="extract" ${data?.type=='extract'?'selected':''}>استخرج</option>
                </select>
                <div id="inputs_${qCount}"></div>
                <button class="btn" style="background:#ef4444; color:white; font-size:0.7rem;" onclick="document.getElementById('${qId}').remove()">حذف</button>
            </div>`;
        document.getElementById('questionsArea').insertAdjacentHTML('beforeend', html);
        renderQInputs(document.querySelector(`#${qId} select`), qCount, data);
    }

    function renderQInputs(select, id, data = null) {
        const target = document.getElementById(`inputs_${id}`);
        const type = select.value;
        let html = `<input type="text" class="q-text" placeholder="السؤال" value="${data?.text||''}">`;
        if(type === 'extract') html = `<textarea class="q-text" placeholder="النص">${data?.text||''}</textarea><input type="text" class="q-sub" placeholder="السؤال المتعلق بالنص" value="${data?.sub||''}">`;
        if(type === 'choice') html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><input type="text" class="opt1" placeholder="1" value="${data?.opts?.[0]||''}"> <input type="text" class="opt2" placeholder="2" value="${data?.opts?.[1]||''}"> <input type="text" class="opt3" placeholder="3" value="${data?.opts?.[2]||''}"> <input type="text" class="opt4" placeholder="4" value="${data?.opts?.[3]||''}"></div>`;
        target.innerHTML = html;
    }

    function saveToCloud() {
        const id = document.getElementById('currentModelId').value;
        const title = document.getElementById('quizTitle').value;
        const boxes = document.querySelectorAll('.q-box');
        if(!title) return Swal.fire('تنبيه', 'أدخل العنوان', 'warning');

        let questions = [];
        boxes.forEach(box => {
            const type = box.querySelector('.q-type').value;
            let q = { type, text: box.querySelector('.q-text').value };
            if(type==='extract') q.sub = box.querySelector('.q-sub').value;
            if(type==='choice') q.opts = [box.querySelector('.opt1').value, box.querySelector('.opt2').value, box.querySelector('.opt3').value, box.querySelector('.opt4').value];
            questions.push(q);
        });

        const qData = { title, questions, shuffle: document.getElementById('shuffleOpt').checked, lock: document.getElementById('lockOpt').checked };
        if(id) db.ref('models/'+id).update(qData).then(() => Swal.fire('تم التحديث', '', 'success'));
        else db.ref('models').push(qData).then(() => { Swal.fire('تم الحفظ', '', 'success'); newQuiz(); });
    }

    function fetchModels() {
        db.ref('models').on('value', (snap) => {
            const list = document.getElementById('modelsList');
            list.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                list.innerHTML += `<div class="card" style="border-right:5px solid #1e293b; padding:15px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${m.title}</b>
                        <div>
                            <button onclick="loadToEdit('${child.key}')" class="btn btn-action" style="background:#0284c7">📝 تعديل</button>
                            <button onclick="viewResults('${child.key}')" class="btn btn-action" style="background:#059669">📊 النتائج</button>
                            <button onclick="deleteModel('${child.key}')" class="btn btn-action" style="background:#ef4444">🗑️</button>
                        </div>
                    </div>
                    <div id="res_${child.key}" class="hidden"></div>
                </div>`;
            });
        });
    }

    function viewResults(mId) {
        const resDiv = document.getElementById('res_'+mId);
        resDiv.classList.toggle('hidden');
        db.ref('results/'+mId).once('value', (snap) => {
            let html = `<table><tr><th>الطالب</th><th>الفصل</th><th>الوقت</th><th>التفاصيل</th></tr>`;
            snap.forEach(c => {
                const r = c.val();
                let answersHtml = r.answers.map((a, i) => `س${i+1}: ${a}`).join(' | ');
                html += `<tr><td>${r.name}</td><td>${r.class}</td><td>${new Date(r.time).toLocaleTimeString('ar-SA')}</td><td><button onclick="Swal.fire('إجابات الطالب','${answersHtml}')">👁️</button></td></tr>`;
            });
            resDiv.innerHTML = html + `</table>`;
        });
    }

    function loadStudentQuiz(id) {
        db.ref('models/'+id).once('value', (snap) => {
            if(snap.exists()) {
                currentQuiz = snap.val();
                document.getElementById('stQuizTitle').innerText = currentQuiz.title;
            }
        });
    }

    function startStudentQuiz() {
        const name = document.getElementById('stName').value;
        const cls = document.getElementById('stClass').value;
        if(!name || !cls) return Swal.fire('تنبيه', 'أكمل بياناتك', 'warning');
        
        const device = btoa(navigator.userAgent).substring(0,20);
        if(currentQuiz.lock) {
            db.ref('results/'+quizId).orderByChild('device').equalTo(device).once('value', (s) => {
                if(s.exists()) Swal.fire('عذراً', 'لا يسمح بالإعادة', 'error');
                else showStudentQuestions();
            });
        } else { showStudentQuestions(); }
    }

    function showStudentQuestions() {
        document.getElementById('studentLogin').classList.add('hidden');
        document.getElementById('stQuizArea').classList.remove('hidden');
        const area = document.getElementById('stQuestions');
        let qs = currentQuiz.questions;
        if(currentQuiz.shuffle) qs = qs.sort(() => Math.random() - 0.5);
        qs.forEach((q, i) => {
            let h = `<div class="card"><h4>${q.text}</h4>`;
            if(q.type==='extract') h = `<div class="card"><p style="background:#eee;padding:10px">${q.text}</p><h4>${q.sub}</h4>`;
            if(q.type==='choice') q.opts.forEach(o => h += `<label style="display:block"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`);
            else h += `<input type="text" class="ans-input" placeholder="إجابتك...">`;
            area.innerHTML += h + `</div>`;
        });
    }

    function submitStudentAnswers() {
        const ansInputs = document.querySelectorAll('.ans-input, input:checked');
        let answers = [];
        ansInputs.forEach(input => answers.push(input.value || input.nextSibling.textContent.trim()));
        
        const result = {
            name: document.getElementById('stName').value,
            class: document.getElementById('stClass').value,
            answers: answers,
            device: btoa(navigator.userAgent).substring(0,20),
            time: Date.now()
        };
        db.ref('results/'+quizId).push(result).then(() => {
            Swal.fire('تم الإرسال', 'شكراً لك', 'success').then(() => location.reload());
        });
    }

    function generateLink() {
        const id = document.getElementById('currentModelId').value;
        if(!id) return Swal.fire('خطأ', 'احفظ أولاً', 'error');
        const link = window.location.href.split('?')[0] + '?id=' + id;
        Swal.fire('رابط الطلاب', `<input id="copyL" value="${link}" style="width:100%; text-align:center" readonly>`, 'info');
    }

    function newQuiz() { document.getElementById('currentModelId').value=''; document.getElementById('quizTitle').value=''; document.getElementById('questionsArea').innerHTML=''; qCount=0; }
    function loadToEdit(id) { db.ref('models/'+id).once('value', snap => { const m = snap.val(); newQuiz(); document.getElementById('currentModelId').value=id; document.getElementById('quizTitle').value=m.title; m.questions.forEach(q => addQuestion(q)); }); }
    function deleteModel(id) { if(confirm('حذف؟')) db.ref('models/'+id).remove(); }
</script>
</body>
</html>
