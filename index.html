<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الفيفي للاختبارات السحابية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; color: #1e293b; transition: 0.3s; }
        .header { background: linear-gradient(135deg, var(--dark), var(--primary)); color: white; padding: 40px 20px; text-align: center; border-bottom: 5px solid var(--accent); }
        .container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        /* أزرار وتنسيقات */
        .btn { border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Cairo'; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; }
        .btn-admin { background: #64748b; color: white; margin-top: 20px; font-size: 12px; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-family: 'Cairo'; box-sizing: border-box; }
        
        /* لوحة التحكم */
        #adminPanel { display: none; background: #fff; border-top: 4px solid var(--dark); }
        .tab-content { display: none; padding: 20px 0; }
        .active-tab { display: block; }
        .tabs-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { background: #eee; padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; font-family: 'Cairo'; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border: 1px solid #e2e8f0; text-align: center; }
        th { background: #f1f5f9; }
        
        .q-item { background: #f8fafc; padding: 15px; border-radius: 10px; border-right: 4px solid var(--accent); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="mainTitle">منصة اختبارات لغتي الرقمية</h1>
    <p>بإشراف الأستاذ: عبدالعزيز الفيفي</p>
</div>

<div class="container">
    <div id="studentLogin" class="card">
        <h3 style="text-align: center;">دخول الطالب</h3>
        <input type="text" id="stdName" placeholder="الاسم الرباعي">
        <input type="text" id="stdClass" placeholder="الصف / الفصل">
        <select id="modelSelect">
            <option value="random">توزيع تلقائي (نماذج متعددة)</option>
            <option value="1">النموذج 1</option>
            <option value="2">النموذج 2</option>
            <option value="3">النموذج 3</option>
            <option value="4">النموذج 4</option>
        </select>
        <button class="btn btn-primary" onclick="initStudentExam()">دخول الاختبار</button>
        <button class="btn btn-admin" onclick="authAdmin()">دخول المعلم 🔒</button>
    </div>

    <div id="examArea" style="display: none;">
        <div id="currentModelInfo" class="card" style="text-align: center; background: #eef2ff;"></div>
        <div id="questionsList"></div>
        <button class="btn btn-primary" style="background: var(--success); font-size: 1.2rem;" onclick="submitExam()">إرسال الإجابات للسحابة</button>
    </div>

    <div id="adminPanel" class="card">
        <div class="tabs-nav">
            <button class="tab-btn active" onclick="showTab('resultsTab')">نتائج الطلاب</button>
            <button class="tab-btn" onclick="showTab('addModelTab')">إضافة نموذج جديد</button>
        </div>

        <div id="resultsTab" class="tab-content active-tab">
            <h3>سجل النتائج السحابي</h3>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>الطالب</th><th>الفصل</th><th>النموذج</th><th>الدرجة</th><th>التوقيت</th></tr></thead>
                    <tbody id="resultsBody"></tbody>
                </table>
            </div>
            <button class="btn" style="background: #ef4444; color: white; margin-top: 10px;" onclick="clearResults()">مسح كافة النتائج</button>
        </div>

        <div id="addModelTab" class="tab-content">
            <h3>إنشاء نموذج اختبار جديد</h3>
            <input type="text" id="newModelTitle" placeholder="عنوان النموذج (مثلاً: اختبار الوحدة الثالثة)">
            <p style="font-size: 0.8rem; color: #666;">أضف الأسئلة بتنسيق: السؤال | الإجابة (كل سؤال في سطر)</p>
            <textarea id="newQuestionsRaw" rows="10" placeholder="مثال:&#10;ما علامة جزم المضارع صحيح الآخر؟ | السكون&#10;لن أذهب.. الفعل منصوب بـ؟ | لن"></textarea>
            <button class="btn btn-primary" onclick="saveNewModel()">حفظ النموذج في السحابة</button>
        </div>
        
        <button class="btn btn-admin" style="width: 100%; margin-top: 20px;" onclick="location.reload()">تسجيل خروج المعلم</button>
    </div>
</div>

<script>
    // --- إعدادات Firebase الخاصة بك ---
    const firebaseConfig = {
        apiKey: "AIzaSyAvRIim7axjg0hGrMk0qVrXT...", // تأكد من وضع مفتاحك الكامل هنا
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
        projectId: "youy-apps",
        storageBucket: "youy-apps.appspot.com",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // النماذج الافتراضية (1-4) مخزنة ككائنات
    const defaultModels = {
        "1": { title: "النموذج 1", questions: [{q:"علامة جزم الفعل يرمي", a:"حذف حرف العلة"}, {q:"الأداة لن تفيد النفي في", a:"المستقبل"}] },
        "2": { title: "النموذج 2", questions: [{q:"من أدوات الجزم", a:"لم"}, {q:"يبنى المضارع على السكون إذا اتصلت به", a:"نون النسوة"}] }
    };

    let activeQuestions = [];
    let activeModelName = "";

    // --- وظائف الطلاب ---
    function initStudentExam() {
        const name = document.getElementById('stdName').value;
        const cls = document.getElementById('stdClass').value;
        let model = document.getElementById('modelSelect').value;

        if(!name || !cls) return Swal.fire('تنبيه','أكمل بياناتك أولاً','warning');
        
        if(model === "random") model = Math.floor(Math.random() * 2) + 1; // توزيع بين النماذج المتوفرة
        
        // جلب بيانات النموذج من السحابة أو الافتراضي
        activeModelName = "نموذج " + model;
        activeQuestions = defaultModels[model].questions;

        document.getElementById('studentLogin').style.display = 'none';
        document.getElementById('examArea').style.display = 'block';
        document.getElementById('currentModelInfo').innerHTML = `<h3>أهلاً بك يا ${name}</h3><p>أنت الآن تؤدي: ${activeModelName}</p>`;
        
        renderQuestions();
    }

    function renderQuestions() {
        let html = '';
        activeQuestions.forEach((q, i) => {
            html += `<div class="card q-item"><b>س${i+1}: ${q.q}</b><input type="text" id="userAns${i}" placeholder="أجب هنا..."></div>`;
        });
        document.getElementById('questionsList').innerHTML = html;
    }

    function submitExam() {
        let score = 0;
        activeQuestions.forEach((q, i) => {
            if(document.getElementById(`userAns${i}`).value.trim() === q.a) score++;
        });

        const result = {
            name: document.getElementById('stdName').value,
            class: document.getElementById('stdClass').value,
            model: activeModelName,
            score: score + " / " + activeQuestions.length,
            time: new Date().toLocaleString('ar-SA')
        };

        db.ref('all_results').push(result).then(() => {
            Swal.fire('تم الإرسال',`شكراً لك، حصلت على ${result.score}. تم حفظ النتيجة للمعلم.`,'success').then(() => location.reload());
        });
    }

    // --- وظائف المعلم ---
    function authAdmin() {
        Swal.fire({
            title: 'دخول المعلم',
            input: 'password',
            inputPlaceholder: 'كلمة المرور',
            showCancelButton: true
        }).then((res) => {
            if(res.value === "admin123") { // كلمة السر الخاصة بك
                document.getElementById('studentLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadResults();
            } else if(res.value) {
                Swal.fire('خطأ','كلمة المرور غير صحيحة','error');
            }
        });
    }

    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active-tab');
        event.target.classList.add('active');
    }

    function loadResults() {
        db.ref('all_results').on('value', (snap) => {
            let html = '';
            snap.forEach(child => {
                const r = child.val();
                html += `<tr><td>${r.name}</td><td>${r.class}</td><td>${r.model}</td><td>${r.score}</td><td>${r.time}</td></tr>`;
            });
            document.getElementById('resultsBody').innerHTML = html || '<tr><td colspan="5">لا توجد نتائج بعد</td></tr>';
        });
    }

    function saveNewModel() {
        const title = document.getElementById('newModelTitle').value;
        const raw = document.getElementById('newQuestionsRaw').value;
        if(!title || !raw) return alert("أكمل بيانات النموذج");

        const lines = raw.split('\n');
        const qs = lines.map(l => {
            const parts = l.split('|');
            return { q: parts[0]?.trim(), a: parts[1]?.trim() };
        }).filter(x => x.q && x.a);

        db.ref('custom_models').push({ title, questions: qs }).then(() => {
            Swal.fire('تم الحفظ','النموذج الجديد متاح الآن للطلاب','success');
            document.getElementById('newModelTitle').value = '';
            document.getElementById('newQuestionsRaw').value = '';
        });
    }

    function clearResults() {
        if(confirm("هل أنت متأكد من مسح جميع سجلات الطلاب؟")) {
            db.ref('all_results').remove();
        }
    }
</script>
</body>
</html>
