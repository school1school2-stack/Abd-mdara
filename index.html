<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أ. عبدالعزيز الفيفي - النسخة الشاملة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --royal-blue: #1e3a8a; --q-red: #ef4444; --bg-page: #f8fafc; --success-green: #10b981; --kifayat-purple: #7c3aed; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-page); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        .section-tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 850px; }
        .tab { flex: 1; padding: 15px; text-align: center; background: white; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; border: 2px solid transparent; }
        .tab.active-qudrat { border-color: var(--royal-blue); color: var(--royal-blue); box-shadow: 0 4px 12px rgba(30, 58, 138, 0.1); }
        .tab.active-kifayat { border-color: var(--kifayat-purple); color: var(--kifayat-purple); box-shadow: 0 4px 12px rgba(124, 58, 237, 0.1); }

        .user-header { width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-bottom: 5px solid #3b82f6; margin-bottom: 10px; box-sizing: border-box; }
        .user-name { margin: 0; color: var(--royal-blue); font-weight: bold; font-size: 1.5rem; }
        .logo-box { background: var(--royal-blue); width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.4rem; }

        .container { width: 100%; max-width: 850px; padding-bottom: 120px; }
        .question-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; border: 2px solid #e2e8f0; position: relative; text-align: right; box-sizing: border-box; }
        .question-card.kifayat-style::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--kifayat-purple); }
        .question-card.qudrat-style::before { content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 8px; background: var(--royal-blue); }

        .smart-paste-area { margin-bottom: 15px; background: #f0fdf4; padding: 10px; border-radius: 10px; border: 1px dashed var(--success-green); }
        .smart-input { width: 100%; border: none; background: transparent; font-family: inherit; outline: none; }

        .estieab-box { background: #fff9c4 !important; border: 2px solid #fbc02d; border-radius: 12px; padding: 15px; margin-bottom: 15px; font-weight: bold; width: 100%; box-sizing: border-box; min-height: 80px; }
        .q-text-input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 12px; color: var(--q-red); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; outline: none; }
        
        /* مساحة إجابة الطالب المقالية */
        .student-answer-zone { background: #f8fafc; border: 2px inset #e2e8f0; padding: 15px; border-radius: 10px; margin-top: 10px; min-height: 50px; color: #1e293b; font-weight: bold; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-pair-row { display: flex; align-items: center; background: white; border: 1.5px solid #d1d5db; border-radius: 10px; padding: 10px; cursor: pointer; }
        .selected-opt { background: #dbeafe !important; border-color: #3b82f6 !important; }

        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 1000; background: #1e293b; padding: 10px 20px; border-radius: 50px; }
        .btn { border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; color: white; font-family: inherit; }
        
        #report-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 95%; max-width: 800px; height: 85%; background: white; z-index: 2000; border-radius: 20px; padding: 25px; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        .report-table { width: 100%; border-collapse: collapse; }
        .report-table th, .report-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; }
        .editable-grade { cursor: pointer; background: #fef9c3; padding: 2px 8px; border-radius: 5px; font-weight: bold; }

        body.student-mode .admin-only, body.student-mode .controls, body.student-mode .type-select { display: none !important; }
    </style>
</head>
<body>

    <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1999;" onclick="closeReport()"></div>
    <div id="report-modal">
        <h2 style="text-align:center;">تقرير أداء الطالب 📊</h2>
        <div id="score-summary" style="text-align:center; font-size:1.2rem; margin-bottom:15px;"></div>
        <table class="report-table">
            <thead>
                <tr><th>#</th><th>السؤال</th><th>إجابتك</th><th>الصحيحة</th><th>الدرجة</th></tr>
            </thead>
            <tbody id="report-body"></tbody>
        </table>
        <p style="font-size:0.8rem; color:gray; text-align:center; margin-top:10px;">* يمكن للمعلم الضغط على الدرجة لتعديلها يدوياً</p>
        <button class="btn" style="background:#64748b; width:100%; margin-top:10px;" onclick="closeReport()">إغلاق</button>
    </div>

    <div class="user-header">
        <div class="header-right"><h2 class="user-name">أ. عبدالعزيز الفيفي</h2></div>
        <div class="header-center"><div class="logo-box"><i class="fas fa-pen-nib"></i></div></div>
        <div class="header-left"><p style="font-weight:bold; color:#64748b;">ثانوية الأمير عبدالمجيد 😉</p></div>
    </div>

    <div class="section-tabs" id="admin-tabs">
        <div class="tab active-qudrat" id="tab-qudrat" onclick="switchSection('qudrat')">قسم القدرات اللفظية</div>
        <div class="tab" id="tab-kifayat" onclick="switchSection('kifayat')">قسم الكفايات اللغوية</div>
    </div>

    <div class="container" id="quiz-content"></div>

    <div id="student-actions" style="display:none; margin-bottom:100px;">
        <button class="btn" style="background:var(--success-green); padding:15px 40px; font-size:1.2rem;" onclick="gradeExam()">اعتماد وإرسال الحل</button>
    </div>

    <div class="controls" id="admin-controls">
        <button class="btn" style="background:#3b82f6" onclick="addQuestion()">+ إضافة سؤال</button>
        <button class="btn" style="background:#a855f7" onclick="saveToCloud()">حفظ سحابي</button>
        <button class="btn" style="background:#06b6d4" onclick="generateStudentLink()">رابط الطلاب</button>
        <button class="btn" style="background:#ef4444" onclick="clearAll()">مسح</button>
    </div>

    <script>
        let currentSection = 'qudrat';
        const typeMap = {
            'qudrat': { 'ekmal': 'إكمال جمل', 'khata': 'خطأ سياقي', 'tanazor': 'تناظر لفظي', 'estieab': 'استيعاب المقروء' },
            'kifayat': { 'k_fill': 'أكمل الفراغ', 'k_irab': 'أعرب ما تحته خط', 'k_sentence': 'مثّل في جملة مفيدة', 'k_extract': 'استخرج من النص', 'k_true': 'صح وخطأ', 'k_multi': 'اختر الإجابة' }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyAVrIim7aXjg0hGrMk0qVrXT8geRIpHoBk",
            authDomain: "youy-apps.firebaseapp.com",
            databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
            projectId: "youy-apps"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function switchSection(sec) {
            currentSection = sec;
            document.getElementById('tab-qudrat').className = 'tab' + (sec==='qudrat'?' active-qudrat':'');
            document.getElementById('tab-kifayat').className = 'tab' + (sec==='kifayat'?' active-kifayat':'');
            document.getElementById('quiz-content').innerHTML = '';
            loadLocal();
        }

        function addQuestion(data = null) {
            const container = document.getElementById('quiz-content');
            const card = document.createElement('div');
            const type = data ? data.type : (currentSection === 'qudrat' ? 'ekmal' : 'k_fill');
            card.className = `question-card ${currentSection}-style`;
            card.dataset.section = currentSection;

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <select class="type-select" onchange="updateType(this)">
                        ${Object.entries(typeMap[currentSection]).map(([k,v])=>`<option value="${k}" ${type===k?'selected':''}>${v}</option>`).join('')}
                    </select>
                    <i class="fas fa-trash admin-only" style="color:#cbd5e1; cursor:pointer" onclick="this.closest('.question-card').remove(); saveLocal();"></i>
                </div>
                <div class="smart-paste-area admin-only">
                    <input class="smart-input" placeholder="اللصق الذكي هنا..." oninput="autoDistribute(this)">
                </div>
                <div class="q-area">${renderQ(type, data)}</div>
                <div class="ans-area">${renderA(type, data)}</div>
                <div class="correct-ans-box admin-only" style="${['k_true','k_multi','ekmal','khata','tanazor'].includes(type)?'':'display:none'}">
                    الإجابة الصحيحة: <input type="text" class="ans-val" style="width:50px" value="${data?.ans||''}" oninput="saveLocal()">
                </div>
            `;
            container.appendChild(card);
            saveLocal();
        }

        function renderQ(t, d) {
            if (t === 'estieab' || t === 'k_extract') return `<div class="estieab-box" contenteditable="true" oninput="saveLocal()">${d?.text_area||'نص القطعة هنا...'}</div><input class="q-text-input q-main" value="${d?.text||''}" placeholder="السؤال..." oninput="saveLocal()">`;
            if (t === 'tanazor') return `<div style="display:flex; gap:10px; justify-content:center;"><input class="q-text-input t1" style="width:100px" value="${d?.text1||''}"> : <input class="q-text-input t2" style="width:100px" value="${d?.text2||''}"></div>`;
            return `<input class="q-text-input q-main" value="${d?.text||''}" placeholder="اكتب السؤال هنا..." oninput="saveLocal()">`;
        }

        function renderA(t, d) {
            if (['k_fill', 'k_irab', 'k_sentence', 'k_extract'].includes(t)) {
                return `<div class="student-answer-zone" contenteditable="true" placeholder="اكتب إجابتك هنا..."></div>`;
            }
            let h = '<div class="options-grid">';
            const labels = ['أ', 'ب', 'ج', 'د'];
            const count = t === 'k_true' ? 2 : 4;
            for(let i=0; i<count; i++) {
                h += `<div class="opt-pair-row" onclick="selectOpt(this)">
                    <span style="font-weight:bold; color:var(--royal-blue); margin-left:5px;">${labels[i]})</span>
                    <input class="smart-input opt" value="${d?.opts?.[i]||(t==='k_true'?(i===0?'صح':'خطأ'):'')}" oninput="saveLocal()">
                </div>`;
            }
            return h + '</div>';
        }

        function selectOpt(el) {
            if (!document.body.classList.contains('student-mode')) return;
            el.closest('.options-grid').querySelectorAll('.opt-pair-row').forEach(r => r.classList.remove('selected-opt'));
            el.classList.add('selected-opt');
        }

        function gradeExam() {
            const cards = document.querySelectorAll('.question-card');
            const report = document.getElementById('report-body');
            report.innerHTML = "";
            let total = 0;

            cards.forEach((c, i) => {
                const type = c.querySelector('.type-select').value;
                const qText = c.querySelector('.q-main')?.value || "سؤال " + (i+1);
                let studentAns = "", isCorrect = false, score = 0;

                if (['k_true','k_multi','ekmal','khata','tanazor'].includes(type)) {
                    const sel = c.querySelector('.selected-opt')?.innerText.split(')')[0].trim();
                    const correct = c.querySelector('.ans-val').value.trim();
                    studentAns = sel || "لم يحل";
                    isCorrect = (sel === correct);
                    score = isCorrect ? 1 : 0;
                } else {
                    studentAns = c.querySelector('.student-answer-zone').innerText;
                    score = studentAns.length > 2 ? 1 : 0; // تصحيح مبدئي ذكي
                }
                total += score;
                report.innerHTML += `<tr>
                    <td>${i+1}</td>
                    <td style="text-align:right">${qText}</td>
                    <td>${studentAns}</td>
                    <td>${c.querySelector('.ans-val')?.value || 'تصحيح معلم'}</td>
                    <td><span class="editable-grade" onclick="editGrade(this)">${score}</span></td>
                </tr>`;
            });
            document.getElementById('score-summary').innerText = `الدرجة الإجمالية: ${total} من ${cards.length}`;
            document.getElementById('report-modal').style.display = "block";
            document.getElementById('modal-overlay').style.display = "block";
        }

        function editGrade(el) {
            let n = prompt("عدل الدرجة:", el.innerText);
            if(n !== null) el.innerText = n;
        }

        function saveLocal() {
            const qs = [];
            document.querySelectorAll('.question-card').forEach(c => {
                const t = c.querySelector('.type-select').value;
                qs.push({
                    type: t,
                    text: c.querySelector('.q-main')?.value || '',
                    text_area: c.querySelector('.estieab-box')?.innerText || '',
                    ans: c.querySelector('.ans-val')?.value || '',
                    opts: Array.from(c.querySelectorAll('.opt')).map(o => o.value)
                });
            });
            localStorage.setItem('fifi_v2026_' + currentSection, JSON.stringify(qs));
        }

        function loadLocal() {
            const s = localStorage.getItem('fifi_v2026_' + currentSection);
            if(s) JSON.parse(s).forEach(q => addQuestion(q));
        }

        function closeReport() { document.getElementById('report-modal').style.display = 'none'; document.getElementById('modal-overlay').style.display = 'none'; }
        
        async function saveToCloud() {
            const n = prompt("اسم النموذج:");
            if(n) {
                const data = localStorage.getItem('fifi_v2026_' + currentSection);
                await db.ref('models/' + n).set({ section: currentSection, data: JSON.parse(data), teacher: "أ. عبدالعزيز الفيفي" });
                alert("تم الحفظ في السحابة!");
            }
        }

        function generateStudentLink() {
            const n = prompt("اسم النموذج المحفوظ سحابياً:");
            if(n) {
                const url = window.location.origin + window.location.pathname + "?exam=" + encodeURIComponent(n);
                prompt("انسخ رابط الطلاب:", url);
            }
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            if(params.get('exam')) {
                document.body.classList.add('student-mode');
                document.getElementById('admin-tabs').style.display = 'none';
                document.getElementById('student-actions').style.display = 'block';
                db.ref('models/' + params.get('exam')).once('value', s => {
                    if(s.val()) {
                        currentSection = s.val().section;
                        s.val().data.forEach(q => addQuestion(q));
                    }
                });
            } else {
                loadLocal();
            }
        };
    </script>
</body>
</html>
