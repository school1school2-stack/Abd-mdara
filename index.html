<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
    /* الإضافات الجديدة للوحة التحكم */
    .dashboard-section { width: 100%; max-width: 850px; background: white; border-radius: 15px; padding: 20px; margin-top: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
    .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    .needs-review { background: #fef9c3; color: #854d0e; border: 1px solid #fde047; }
    .chart-container { width: 100%; height: 300px; margin-top: 20px; }
    .notification-dot { height: 10px; width: 10px; background-color: var(--q-red); border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
</style>

<div class="dashboard-section admin-only" id="teacher-dashboard">
    <h3 style="color: var(--royal-blue); border-bottom: 2px solid #eff6ff; padding-bottom: 10px;">
        <i class="fas fa-chart-line"></i> لوحة متابعة الطلاب 
        <span id="new-notif" style="display:none"><span class="notification-dot"></span> تنبيه: نماذج جديدة</span>
    </h3>
    
    <div class="chart-container"><canvas id="statsChart"></canvas></div>

    <div style="overflow-x:auto; margin-top:20px;">
        <table class="report-table" id="submissions-table">
            <thead>
                <tr><th>اسم الطالب</th><th>الدرجة</th><th>الحالة</th><th>عرض الإجابات</th></tr>
            </thead>
            <tbody id="submissions-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // تعديل دالة حفظ النتائج لتشمل السحابة باسم الطالب
    async function gradeExam() {
        const studentName = prompt("الرجاء إدخال اسمك الثلاثي لاعتماد النتيجة:") || "طالب مجهول";
        // ... نفس كود التصحيح السابق ...
        
        // إرسال النتيجة للسحابة
        const examId = new URLSearchParams(window.location.search).get('exam');
        if(examId) {
            await db.ref('submissions/' + examId).push({
                student: studentName,
                score: s,
                total: cards.length,
                timestamp: new Date().toLocaleString(),
                details: Array.from(cards).map(c => ({
                    q: c.querySelector('.q-main')?.value || "سؤال",
                    ans: c.querySelector('.essay-input')?.innerText || c.querySelector('.selected-opt')?.innerText || "لم يحل"
                }))
            });
            alert("تم إرسال إجابتك بنجاح يا " + studentName);
        }
        // عرض التقرير للطالب
        showReport(s, cards.length); 
    }

    // دالة المعلم لسحب النتائج وتحليلها
    function loadSubmissions() {
        const examName = prompt("أدخل اسم النموذج لمشاهدة نتائج الطلاب:");
        if(!examName) return;

        db.ref('submissions/' + examName).on('value', (snapshot) => {
            const data = snapshot.val();
            const body = document.getElementById('submissions-body');
            body.innerHTML = "";
            let grades = { 'ممتاز': 0, 'جيد': 0, 'ضعيف': 0 };

            if(data) {
                document.getElementById('new-notif').style.display = 'inline';
                Object.values(data).forEach(res => {
                    const percent = (res.score / res.total) * 100;
                    if(percent >= 85) grades['ممتاز']++;
                    else if(percent >= 60) grades['جيد']++;
                    else grades['ضعيف']++;

                    body.innerHTML += `
                        <tr>
                            <td>${res.student}</td>
                            <td>${res.score} / ${res.total}</td>
                            <td><span class="status-badge ${res.total > 5 ? 'needs-review' : ''}">تم التسليم</span></td>
                            <td><button class="btn" style="background:var(--royal-blue); padding:5px 10px;" onclick="viewDetail('${res.student}')">فتح</button></td>
                        </tr>`;
                });
                updateChart(grades);
            }
        });
    }

    function updateChart(data) {
        const ctx = document.getElementById('statsChart').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(data),
                datasets: [{
                    label: 'توزيع مستويات الطلاب',
                    data: Object.values(data),
                    backgroundColor: ['#10b981', '#3b82f6', '#ef4444']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
