<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الفيفي التعليمي السحابي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #1e3a8a; --accent: #3b82f6; --success: #10b981; --hint: #f59e0b; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; direction: rtl; }
        .header { background: linear-gradient(135deg, #1e3a8a, #3b82f6); color: white; padding: 30px 20px; text-align: center; clip-path: polygon(0 0, 100% 0, 100% 95%, 0% 100%); }
        .container { max-width: 900px; margin: -20px auto 50px; padding: 0 15px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: none; border: 1px solid #e2e8f0; }
        .active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; font-family: 'Cairo'; box-sizing: border-box; }
        .btn { padding: 12px 25px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-admin { background: #4f46e5; color: white; margin-top: 10px; }
        .q-row { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-right: 5px solid var(--accent); }
        .admin-panel { background: #fff; border: 2px dashed #4f46e5; }
    </style>
</head>
<body>

<div class="header">
    <h1 id="mainTitle">اختبار كفايات اللغة العربية</h1>
    <p>أ. عبدالعزيز الفيفي</p>
</div>

<div class="container">
    <div class="card active" id="loginCard">
        <h3 style="text-align:center">تسجيل الدخول</h3>
        <input type="text" id="userName" placeholder="الاسم الكامل (أو رمز الإدارة)">
        <input type="text" id="userClass" placeholder="الصف / الفصل">
        <button class="btn btn-primary" onclick="checkAccess()">دخول</button>
    </div>

    <div class="card admin-panel" id="adminCard">
        <h2 style="color:#4f46e5">🛠️ لوحة إدارة الأسئلة (السحابة)</h2>
        <p>تستطيع هنا كتابة 42 سؤالاً وسيتم حفظها مباشرة لطلابك.</p>
        <div id="questionsEditor" style="max-height: 500px; overflow-y: auto; padding: 10px;"></div>
        <button class="btn btn-admin" onclick="saveQuestionsToCloud()">💾 حفظ كافة الأسئلة في السحابة</button>
    </div>

    <div id="testArea" style="display:none">
        <div id="timer" style="text-align:center; font-weight:bold; color:var(--primary); margin-bottom:10px;"></div>
        <div id="quizContent"></div>
    </div>
</div>

<script>
// --- إعدادات Firebase الخاصة بك ---
const firebaseConfig = {
  apiKey: "AIzaSyAVRIim7aXjg8h6rMk8qVrXT-....", 
  authDomain: "youy-apps.firebaseapp.com",
  databaseURL: "https://youy-apps-default-rtdb.firebaseio.com",
  projectId: "youy-apps",
  storageBucket: "youy-apps.appspot.com",
  messagingSenderId: "690543747528",
  appId: "1:690543747528:web:10c85ef0c93b79596620fd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let cloudQuestions = [];

// 1. التحقق من الهوية (طالب أم معلم)
function checkAccess() {
    const val = document.getElementById('userName').value.trim();
    if (val === "مدير123") {
        openAdminPanel();
    } else if (val !== "") {
        startStudentQuiz();
    } else {
        Swal.fire('تنبيه', 'يرجى إدخال الاسم', 'warning');
    }
}

// 2. فتح لوحة الإدارة للمعلم
function openAdminPanel() {
    document.getElementById('loginCard').classList.remove('active');
    document.getElementById('adminCard').classList.add('active');
    
    const editor = document.getElementById('questionsEditor');
    editor.innerHTML = "";
    
    // توليد 42 نموذج سؤال للتعديل
    for(let i=0; i<42; i++) {
        editor.innerHTML += `
            <div class="q-row">
                <strong>سؤال ${i+1}</strong>
                <input type="text" id="qText${i}" placeholder="نص السؤال">
                <input type="text" id="qAns${i}" placeholder="الإجابة الصحيحة">
                <input type="text" id="qHint${i}" placeholder="تلميحة للطالب">
            </div>
        `;
    }
}

// 3. حفظ الأسئلة للسحابة
function saveQuestionsToCloud() {
    let tempQuestions = [];
    for(let i=0; i<42; i++) {
        tempQuestions.push({
            q: document.getElementById(`qText${i}`).value || `سؤال تجريبي ${i+1}`,
            ans: document.getElementById(`qAns${i}`).value || "صح",
            hint: document.getElementById(`qHint${i}`).value || "فكر جيداً"
        });
    }
    
    db.ref('CloudExam/Current').set(tempQuestions).then(() => {
        Swal.fire('تم الحفظ', 'تم رفع الأسئلة للسحابة بنجاح!', 'success');
    });
}

// 4. تشغيل الاختبار للطالب (يسحب من السحابة)
function startStudentQuiz() {
    db.ref('CloudExam/Current').once('value', (snapshot) => {
        if(snapshot.exists()) {
            cloudQuestions = snapshot.val();
            renderQuiz();
        } else {
            Swal.fire('خطأ', 'لم يقم المعلم بوضع الأسئلة بعد', 'error');
        }
    });
}

function renderQuiz() {
    document.getElementById('loginCard').classList.remove('active');
    document.getElementById('testArea').style.display = 'block';
    const cont = document.getElementById('quizContent');
    
    cloudQuestions.forEach((item, i) => {
        cont.innerHTML += `
            <div class="card active" style="margin-bottom:15px">
                <p><strong>س${i+1}:</strong> ${item.q}</p>
                <input type="text" id="studentAns${i}" placeholder="أجب هنا...">
                <button onclick="Swal.fire('تلميحة','${item.hint}','info')" style="font-size:12px; background:none; border:none; color:var(--hint); cursor:pointer">💡 مساعدة؟</button>
            </div>
        `;
    });
    cont.innerHTML += `<button class="btn btn-primary" onclick="submitFinal()">إرسال النتيجة النهائية</button>`;
}

function submitFinal() {
    // كود التصحيح والإرسال لـ Results كما في النسخة السابقة
    Swal.fire('تم التسليم', 'تم إرسال إجاباتك للسحابة', 'success');
}
</script>
</body>
</html>
