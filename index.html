<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الاختبارات | أ. عبدالعزيز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --primary: #7f1d1d; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; border-right: 8px solid var(--primary); }
        .btn { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-family: 'Cairo'; margin: 5px; }
        .btn-edit { background: #0284c7; color: white; }
        .btn-view { background: #059669; color: white; }
        .btn-save { background: var(--primary); color: white; width: 100%; margin-top: 15px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; font-family: 'Cairo'; }
        .q-item { background: #f1f5f9; padding: 10px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div style="text-align:center; margin-bottom:30px;">
    <h2>مركز إدارة النماذج السحابية ☁️</h2>
    <p>مشروع: <b>Youy-apps</b></p>
</div>

<div class="card" id="editorSection">
    <h3 id="editorTitle">➕ إنشاء نموذج جديد</h3>
    <input type="hidden" id="currentModelKey">
    <input type="text" id="quizTitle" placeholder="اسم النموذج (مثلاً: كفايات 4)">
    <div id="questionsContainer"></div>
    <button class="btn" style="background:#ddd" onclick="addNewQuestion()">+ إضافة سؤال</button>
    <button class="btn btn-save" onclick="saveToFirebase()">💾 حفظ التعديلات في السحاب</button>
</div>

<div class="card">
    <h3>📂 النماذج المحفوظة حالياً</h3>
    <div id="cloudModelsList">جاري جلب البيانات من Firebase...</div>
</div>

<script>
    // إعدادات Firebase من واقع صورتك
    const firebaseConfig = {
        apiKey: "AIzaSyAvRIim7axjg0hGrMk0qVrXT...", 
        authDomain: "youy-apps.firebaseapp.com",
        databaseURL: "https://youy-apps-default-rtdb.firebaseio.com", // من الصورة
        projectId: "youy-apps",
        storageBucket: "youy-apps.appspot.com",
        messagingSenderId: "690543747528",
        appId: "1:690543747528:web:10c85ef0c93b79596620fd" // من الصورة
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // جلب النماذج وعرضها مع أزرار التعديل
    function fetchModels() {
        db.ref('models').on('value', (snapshot) => {
            const list = document.getElementById('cloudModelsList');
            list.innerHTML = '';
            if(!snapshot.exists()) { list.innerHTML = 'لا توجد نماذج حالياً'; return; }

            snapshot.forEach((child) => {
                const model = child.val();
                const key = child.key;
                list.innerHTML += `
                    <div style="border-bottom:1px solid #eee; padding:10px; display:flex; justify-content:space-between; align-items:center;">
                        <span><b>${model.title}</b> (${model.questions?.length || 0} سؤال)</span>
                        <div>
                            <button class="btn btn-edit" onclick="editModel('${key}')">📝 تعديل</button>
                            <button class="btn" style="background:#ef4444; color:white;" onclick="deleteModel('${key}')">🗑️ حذف</button>
                        </div>
                    </div>`;
            });
        });
    }

    // وظيفة التعديل: جلب بيانات النموذج ووضعها في المحرر
    function editModel(key) {
        db.ref('models/' + key).once('value', (snap) => {
            const data = snap.val();
            document.getElementById('currentModelKey').value = key;
            document.getElementById('quizTitle').value = data.title;
            document.getElementById('editorTitle').innerText = "📝 تعديل نموذج: " + data.title;
            
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            data.questions.forEach((q, index) => {
                addNewQuestion(q.text, q.ans);
            });
            window.scrollTo(0,0);
        });
    }

    function addNewQuestion(text = '', ans = '') {
        const container = document.getElementById('questionsContainer');
        const div = document.createElement('div');
        div.className = 'q-item';
        div.innerHTML = `
            <input type="text" class="q-text" placeholder="السؤال" value="${text}">
            <input type="text" class="q-ans" placeholder="الإجابة (التصحيح ذكي تلقائياً)" value="${ans}">
        `;
        container.appendChild(div);
    }

    function saveToFirebase() {
        const key = document.getElementById('currentModelKey').value;
        const title = document.getElementById('quizTitle').value;
        const qElements = document.querySelectorAll('.q-item');
        
        let questions = [];
        qElements.forEach(el => {
            questions.push({
                text: el.querySelector('.q-text').value,
                ans: el.querySelector('.q-ans').value
            });
        });

        const data = { title: title, questions: questions, lastUpdated: Date.now() };

        if(key) {
            db.ref('models/' + key).update(data).then(() => Swal.fire('تم التعديل!', 'تم تحديث النموذج في السحاب بنجاح', 'success'));
        } else {
            db.ref('models').push(data).then(() => Swal.fire('تم الحفظ!', 'تم إنشاء النموذج الجديد في السحاب', 'success'));
        }
    }

    function deleteModel(key) {
        if(confirm('هل أنت متأكد من حذف هذا النموذج نهائياً من السحاب؟')) {
            db.ref('models/' + key).remove();
        }
    }

    fetchModels();
</script>

</body>
</html>
